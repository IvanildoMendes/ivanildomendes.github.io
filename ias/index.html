<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agentes de IA</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 30px;
    max-width: 900px;
    margin: 50px auto;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 20px;
    text-decoration: none;
    color: black;
    transition: 0.2s;
    border: 2px solid #ddd;
}

.card:hover {
    transform: scale(1.05);
    border-color: #999;
}

.icon {
    width: 80px;
    height: 80px;
    margin-bottom: 10px;
}

.name {
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<h1>Agentes de IA</h1>

<div class="container">

<a class="card" href="https://chat.openai.com" target="_blank">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg">
    <div class="name">ChatGPT</div>
</a>

<a class="card" href="https://gemini.google.com" target="_blank">
    <img class="icon" src="https://www.gstatic.com/lamda/images/gemini_sparkle_4g_512_lt_f94943af3be039176192d.png">
    <div class="name">Gemini</div>
</a>
<a class="card" href="https://claude.ai" target="_blank">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Claude_AI_symbol.svg">
    <div class="name">Claude</div>
</a>



<a class="card" href="https://www.deepseek.com" target="_blank">
    <img class="icon" src="https://cdn.deepseek.com/logo.png">
    <div class="name">DeepSeek</div>
</a>

<a class="card" href="https://llama.meta.com" target="_blank">
    <img class="icon" src="https://static.xx.fbcdn.net/rsrc.php/yf/r/-7pQO6hUGK_.svg">
    <div class="name">LLaMA</div>
</a>

<a class="card" href="https://www.perplexity.ai" target="_blank">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/1/1d/Perplexity_AI_logo.svg">
    <div class="name">Perplexity</div>
</a>

<a class="card" href="https://grok.x.ai" target="_blank">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/2/25/XAI.svg">
    <div class="name">Grok</div>
</a>

<a class="card" href="https://www.midjourney.com" target="_blank">
    <img class="icon" src="https://upload.wikimedia.org/wikipedia/en/0/06/Midjourney_logo.svg">
    <div class="name">MidJourney</div>
</a>

</div>

</body>
</html>
