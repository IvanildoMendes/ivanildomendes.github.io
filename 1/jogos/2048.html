<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔢 2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0b0b16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .container {
            background: #1a1a2e;
            padding: 25px 30px 30px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 100%;
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2.2rem;
            margin-bottom: 6px;
        }
        .sub {
            color: #8080a0;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0c0;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .info-bar span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }
        .info-bar .score { color: #ffd700; }
        .info-bar .best { color: #6c6cff; }

        #gameCanvas {
            background: #0f0f1a;
            border-radius: 16px;
            border: 3px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 440px;
            height: auto;
            aspect-ratio: 440 / 440;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
        }
        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(108,108,255,0.15);
        }
        .controls button:active { transform: scale(0.95); }

        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .hint kbd {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            color: #c0c0e0;
            font-weight: 600;
        }

        @media (max-width: 500px) {
            .container { padding: 15px; }
            .info-bar { font-size: 0.9rem; }
            .controls button { padding: 8px 16px; font-size: 0.8rem; }
            .hint { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔢 2048</h1>
    <div class="sub">Junte os números e chegue ao 2048!</div>
    <div class="info-bar">
        <span class="score">🏆 <span id="scoreDisplay">0</span></span>
        <span class="best">⭐ <span id="bestDisplay">0</span></span>
    </div>
    <canvas id="gameCanvas" width="440" height="440"></canvas>
    <div class="controls">
        <button id="newGameBtn">🔄 Novo</button>
        <button id="undoBtn">↩️ Desfazer</button>
    </div>
    <div class="hint">
        <kbd>← ↑ ↓ →</kbd> mover &nbsp;·&nbsp; <kbd>Z</kbd> desfazer
    </div>
</div>

<script>
    // ================================================================
    //  1.  CONFIGURAÇÕES
    // ================================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const bestSpan = document.getElementById('bestDisplay');
    const newGameBtn = document.getElementById('newGameBtn');
    const undoBtn = document.getElementById('undoBtn');

    const SIZE = 4;
    const CELL = 100;
    const GAP = 8;
    const OFFSET = 12;
    const TOTAL = SIZE * CELL + (SIZE - 1) * GAP + OFFSET * 2;

    // Cores dos números (estilo 2048)
    const COLORS = {
        0: { bg: '#2a2a3a', fg: '#2a2a3a' },
        2: { bg: '#eee4da', fg: '#776e65' },
        4: { bg: '#ede0c8', fg: '#776e65' },
        8: { bg: '#f2b179', fg: '#f9f6f2' },
        16: { bg: '#f59563', fg: '#f9f6f2' },
        32: { bg: '#f67c5f', fg: '#f9f6f2' },
        64: { bg: '#f65e3b', fg: '#f9f6f2' },
        128: { bg: '#edcf72', fg: '#f9f6f2' },
        256: { bg: '#edcc61', fg: '#f9f6f2' },
        512: { bg: '#edc850', fg: '#f9f6f2' },
        1024: { bg: '#edc53f', fg: '#f9f6f2' },
        2048: { bg: '#edc22e', fg: '#f9f6f2' },
        4096: { bg: '#3c3a82', fg: '#f9f6f2' },
        8192: { bg: '#2a2a5a', fg: '#f9f6f2' },
    };

    // ================================================================
    //  2.  ESTADO DO JOGO
    // ================================================================
    let grid = [];
    let score = 0;
    let best = parseInt(localStorage.getItem('best2048')) || 0;
    let gameOver = false;
    let won = false;

    // Histórico para desfazer
    let history = [];

    // ================================================================
    //  3.  FUNÇÕES AUXILIARES
    // ================================================================

    function initGrid() {
        grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
        score = 0;
        gameOver = false;
        won = false;
        history = [];
        addRandomTile();
        addRandomTile();
        updateUI();
        draw();
    }

    function addRandomTile() {
        const empty = [];
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === 0) empty.push({ r, c });
            }
        }
        if (empty.length === 0) return false;
        const pos = empty[Math.floor(Math.random() * empty.length)];
        grid[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
        return true;
    }

    function updateUI() {
        scoreSpan.textContent = score;
        if (score > best) {
            best = score;
            localStorage.setItem('best2048', best);
        }
        bestSpan.textContent = best;
    }

    function saveState() {
        history.push({
            grid: grid.map(row => [...row]),
            score: score
        });
        if (history.length > 30) history.shift();
    }

    function undo() {
        if (history.length === 0) return;
        const state = history.pop();
        grid = state.grid;
        score = state.score;
        gameOver = false;
        won = false;
        updateUI();
        draw();
    }

    // ================================================================
    //  4.  LÓGICA DE MOVIMENTO
    // ================================================================

    function slideRow(row) {
        // Remove zeros
        let arr = row.filter(v => v !== 0);
        // Combina
        let result = [];
        let merged = false;
        for (let i = 0; i < arr.length; i++) {
            if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
                result.push(arr[i] * 2);
                score += arr[i] * 2;
                i++;
                merged = true;
            } else {
                result.push(arr[i]);
            }
        }
        // Preenche com zeros à direita
        while (result.length < SIZE) result.push(0);
        return { row: result, merged };
    }

    function move(direction) {
        let moved = false;
        saveState();

        const oldGrid = grid.map(row => [...row]);

        if (direction === 'left') {
            for (let r = 0; r < SIZE; r++) {
                const { row, merged } = slideRow(grid[r]);
                grid[r] = row;
                if (merged) moved = true;
            }
        } else if (direction === 'right') {
            for (let r = 0; r < SIZE; r++) {
                const reversed = [...grid[r]].reverse();
                const { row, merged } = slideRow(reversed);
                grid[r] = row.reverse();
                if (merged) moved = true;
            }
        } else if (direction === 'up') {
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
                const { row, merged } = slideRow(col);
                for (let r = 0; r < SIZE; r++) grid[r][c] = row[r];
                if (merged) moved = true;
            }
        } else if (direction === 'down') {
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = SIZE - 1; r >= 0; r--) col.push(grid[r][c]);
                const { row, merged } = slideRow(col);
                for (let r = 0; r < SIZE; r++) grid[SIZE - 1 - r][c] = row[r];
                if (merged) moved = true;
            }
        }

        if (!moved) {
            // Se não moveu, desfaz o saveState
            history.pop();
            return;
        }

        updateUI();

        // Adiciona novo tile
        const added = addRandomTile();
        if (!added) {
            // Se não há espaço, verifica game over
            if (isGameOver()) {
                gameOver = true;
            }
        } else {
            // Verifica vitória
            if (!won && checkWin()) {
                won = true;
                // Não termina o jogo, apenas mostra mensagem
            }
            // Verifica game over após adicionar
            if (isGameOver()) {
                gameOver = true;
            }
        }

        draw();
    }

    function isGameOver() {
        // Verifica se há zeros
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === 0) return false;
            }
        }
        // Verifica se há vizinhos iguais
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const v = grid[r][c];
                if (c + 1 < SIZE && grid[r][c + 1] === v) return false;
                if (r + 1 < SIZE && grid[r + 1][c] === v) return false;
            }
        }
        return true;
    }

    function checkWin() {
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                if (grid[r][c] === 2048) return true;
            }
        }
        return false;
    }

    // ================================================================
    //  5.  RENDERIZAÇÃO
    // ================================================================

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fundo
        ctx.fillStyle = '#0f0f1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Desenha cada célula
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                const x = OFFSET + c * (CELL + GAP);
                const y = OFFSET + r * (CELL + GAP);
                const val = grid[r][c];
                const color = COLORS[val] || COLORS[0];

                // Fundo da célula
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.fillStyle = color.bg;
                ctx.beginPath();
                ctx.roundRect(x, y, CELL, CELL, 8);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Número
                if (val !== 0) {
                    ctx.fillStyle = color.fg;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const fontSize = val < 100 ? 36 : (val < 1000 ? 30 : 24);
                    ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
                    ctx.fillText(val, x + CELL / 2, y + CELL / 2 + 2);
                }
            }
        }

        // Game Over overlay
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('💀 GAME OVER', canvas.width/2, canvas.height/2 - 20);
            ctx.fillStyle = '#a0a0c0';
            ctx.font = '20px sans-serif';
            ctx.fillText('Clique em "Novo"', canvas.width/2, canvas.height/2 + 40);
        }

        // Win overlay (só mensagem, não bloqueia)
        if (won && !gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🎉 2048!', canvas.width/2, canvas.height/2 - 10);
            ctx.fillStyle = '#fff';
            ctx.font = '18px sans-serif';
            ctx.fillText('Continue jogando!', canvas.width/2, canvas.height/2 + 40);
        }
    }

    // Polyfill para roundRect
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w/2) r = w/2;
            if (r > h/2) r = h/2;
            this.moveTo(x + r, y);
            this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r);
            this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r);
            return this;
        };
    }

    // ================================================================
    //  6.  EVENTOS
    // ================================================================

    // --- Teclado ---
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'z', 'Z'].includes(key)) {
            e.preventDefault();
        }
        if (key === 'ArrowLeft') move('left');
        else if (key === 'ArrowRight') move('right');
        else if (key === 'ArrowUp') move('up');
        else if (key === 'ArrowDown') move('down');
        else if (key === 'z' || key === 'Z') undo();
    });

    // --- Suporte a deslize (touch) ---
    let startX = 0, startY = 0;
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        if (startX === 0 && startY === 0) return;
        const touch = e.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        if (Math.max(absX, absY) < 20) return; // toque muito curto

        if (absX > absY) {
            move(dx > 0 ? 'right' : 'left');
        } else {
            move(dy > 0 ? 'down' : 'up');
        }
        startX = 0;
        startY = 0;
    }, { passive: true });

    // --- Botões ---
    newGameBtn.addEventListener('click', () => {
        initGrid();
        draw();
    });

    undoBtn.addEventListener('click', undo);

    // ================================================================
    //  7.  INICIALIZAR
    // ================================================================

    bestSpan.textContent = best;
    initGrid();
    draw();
</script>
</body>
</html>
