<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧱 Breakout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: #0b0b16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #1a1a2e;
            padding: 25px 30px 30px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a4a;
            text-align: center;
            max-width: 100%;
        }

        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0c0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .info-bar span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }

        .info-bar .lives {
            color: #ff6b6b;
        }
        .info-bar .score {
            color: #ffd700;
        }
        .info-bar .level {
            color: #6c6cff;
        }

        #gameCanvas {
            background: #0f0f1a;
            border-radius: 16px;
            border: 3px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 780px;
            height: auto;
            aspect-ratio: 780 / 400;
            image-rendering: pixelated;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 18px;
        }

        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }

        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(108, 108, 255, 0.15);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
            line-height: 1.6;
        }

        .hint kbd {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            color: #c0c0e0;
            font-weight: 600;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .info-bar { font-size: 0.9rem; }
            .controls button { padding: 8px 18px; font-size: 0.8rem; }
            .hint { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧱 BREAKOUT</h1>

        <div class="info-bar">
            <span class="score">🏆 <span id="scoreDisplay">0</span></span>
            <span class="level">⚡ Nível <span id="levelDisplay">1</span></span>
            <span class="lives">❤️ <span id="livesDisplay">3</span></span>
        </div>

        <canvas id="gameCanvas" width="780" height="400"></canvas>

        <div class="controls">
            <button id="restartBtn">🔄 Reiniciar</button>
            <button id="pauseBtn">⏸️ Pausar</button>
        </div>

        <div class="hint">
            <kbd>←</kbd> <kbd>→</kbd> ou <kbd>Mouse</kbd> mover raquete &nbsp;·&nbsp; <kbd>P</kbd> pausa
        </div>
    </div>

    <script>
        // ================================================================
        //  1.  CONFIGURAÇÕES E ELEMENTOS
        // ================================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const levelSpan = document.getElementById('levelDisplay');
        const livesSpan = document.getElementById('livesDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        const W = 780,
            H = 400;
        const PADDLE_W = 90;
        const PADDLE_H = 14;
        const PADDLE_Y = H - 35;
        const BALL_RADIUS = 8;
        const BALL_SPEED_BASE = 4.5;

        // Cores dos tijolos por linha
        const BRICK_COLORS = ['#ff6b6b', '#ffa94d', '#ffd93d', '#6bcb77', '#4d96ff', '#9b59b6'];

        // ================================================================
        //  2.  ESTADO DO JOGO
        // ================================================================
        let paddle = { x: W / 2 - PADDLE_W / 2, y: PADDLE_Y };
        let ball = { x: W / 2, y: PADDLE_Y - BALL_RADIUS - 2, vx: 0, vy: 0, speed: BALL_SPEED_BASE };
        let bricks = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let totalBricks = 0;
        let brokenBricks = 0;
        let gameOver = false;
        let paused = false;
        let animationId = null;
        let particles = [];
        let ballStuck = true; // se true, a bola segue a raquete

        // Controles
        let mouseX = paddle.x;

        // ================================================================
        //  3.  CONSTRUÇÃO DOS TIJOLOS
        // ================================================================

        function buildBricks(level) {
            const rows = 6;
            const cols = 10;
            const brickW = 64;
            const brickH = 20;
            const gap = 6;
            const offsetX = (W - (cols * (brickW + gap) - gap)) / 2;
            const offsetY = 40 + (level - 1) * 6; // desce um pouco a cada nível

            bricks = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    // Tijolos mais resistentes a partir do nível 3 (alguns precisam de 2 batidas)
                    let hp = 1;
                    if (level >= 3 && r < 2) hp = 2;
                    if (level >= 5 && r === 0) hp = 3;

                    bricks.push({
                        x: offsetX + c * (brickW + gap),
                        y: offsetY + r * (brickH + gap),
                        w: brickW,
                        h: brickH,
                        color: BRICK_COLORS[r % BRICK_COLORS.length],
                        hp: hp,
                        maxHp: hp,
                        alive: true
                    });
                }
            }
            totalBricks = bricks.length;
            brokenBricks = 0;
        }

        // ================================================================
        //  4.  FUNÇÕES AUXILIARES
        // ================================================================

        function resetBall(stuck) {
            ball.x = paddle.x + PADDLE_W / 2;
            ball.y = PADDLE_Y - BALL_RADIUS - 2;
            ball.speed = BALL_SPEED_BASE + (level - 1) * 0.4;
            if (stuck !== undefined) {
                ballStuck = stuck;
            } else {
                ballStuck = true;
            }
            if (!ballStuck) {
                // Lança a bola
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
                ball.vx = ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
            } else {
                ball.vx = 0;
                ball.vy = 0;
            }
        }

        function launchBall() {
            if (ballStuck) {
                ballStuck = false;
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
                ball.vx = ball.speed * Math.cos(angle);
                ball.vy = ball.speed * Math.sin(angle);
            }
        }

        function loseLife() {
            lives--;
            updateUI();
            if (lives <= 0) {
                gameOver = true;
                draw();
                return;
            }
            resetBall(true);
            draw();
        }

        function nextLevel() {
            level++;
            buildBricks(level);
            brokenBricks = 0;
            resetBall(true);
            // Aumenta a velocidade da bola gradualmente
            ball.speed = BALL_SPEED_BASE + (level - 1) * 0.5;
            updateUI();
            draw();
        }

        function checkWin() {
            if (brokenBricks >= totalBricks) {
                // Venceu o nível
                if (level >= 5) {
                    gameOver = true;
                    // Vitória final!
                    draw();
                    return;
                }
                nextLevel();
            }
        }

        function updateUI() {
            scoreSpan.textContent = score;
            levelSpan.textContent = level;
            livesSpan.textContent = lives;
        }

        // ================================================================
        //  5.  PARTÍCULAS (efeito visual)
        // ================================================================

        function spawnParticles(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * 2 * Math.PI;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.025,
                    size: 3 + Math.random() * 4,
                    color: color
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08; // gravidade
                p.life -= p.decay;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (const p of particles) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        // ================================================================
        //  6.  ATUALIZAÇÃO DO JOGO (FÍSICA)
        // ================================================================

        function update() {
            if (paused || gameOver) return;

            // --- Raquete (mouse) ---
            paddle.x += (mouseX - paddle.x) * 0.2;
            paddle.x = Math.max(0, Math.min(W - PADDLE_W, paddle.x));

            // --- Bola presa ---
            if (ballStuck) {
                ball.x = paddle.x + PADDLE_W / 2;
                ball.y = PADDLE_Y - BALL_RADIUS - 2;
                return;
            }

            // --- Movimento da bola ---
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Colisão com paredes
            if (ball.x - BALL_RADIUS < 0) {
                ball.x = BALL_RADIUS;
                ball.vx = -ball.vx;
            }
            if (ball.x + BALL_RADIUS > W) {
                ball.x = W - BALL_RADIUS;
                ball.vx = -ball.vx;
            }
            if (ball.y - BALL_RADIUS < 0) {
                ball.y = BALL_RADIUS;
                ball.vy = -ball.vy;
            }
            if (ball.y + BALL_RADIUS > H) {
                // Perdeu a bola
                loseLife();
                return;
            }

            // --- Colisão com a raquete ---
            const bx = ball.x,
                by = ball.y;
            if (ball.vy > 0 &&
                by + BALL_RADIUS > paddle.y &&
                by - BALL_RADIUS < paddle.y + PADDLE_H &&
                bx > paddle.x && bx < paddle.x + PADDLE_W) {

                // Calcula ângulo de rebote baseado na posição do impacto (0~1)
                const hitPos = (bx - paddle.x) / PADDLE_W; // 0~1
                const angle = (hitPos - 0.5) * 1.2; // -0.6 ~ 0.6 rad
                // Ajusta velocidade (pode variar)
                const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                const newSpeed = Math.min(8, currentSpeed + 0.15);
                ball.vx = newSpeed * Math.sin(angle);
                ball.vy = -newSpeed * Math.cos(angle);
                // Reposiciona para não ficar colado
                ball.y = paddle.y - BALL_RADIUS - 1;

                // Pequeno efeito de partículas
                spawnParticles(bx, paddle.y, '#6c6cff', 5);
            }

            // --- Colisão com tijolos ---
            for (const brick of bricks) {
                if (!brick.alive) continue;
                const bx2 = brick.x,
                    by2 = brick.y,
                    bw = brick.w,
                    bh = brick.h;
                // Detecção AABB
                const overlapX = (ball.x + BALL_RADIUS > bx2) && (ball.x - BALL_RADIUS < bx2 + bw);
                const overlapY = (ball.y + BALL_RADIUS > by2) && (ball.y - BALL_RADIUS < by2 + bh);
                if (overlapX && overlapY) {
                    // Determina de qual lado colidiu
                    const dx1 = (ball.x + BALL_RADIUS) - bx2;
                    const dx2 = (bx2 + bw) - (ball.x - BALL_RADIUS);
                    const dy1 = (ball.y + BALL_RADIUS) - by2;
                    const dy2 = (by2 + bh) - (ball.y - BALL_RADIUS);
                    const minDx = Math.min(dx1, dx2);
                    const minDy = Math.min(dy1, dy2);

                    if (minDx < minDy) {
                        ball.vx = -ball.vx;
                    } else {
                        ball.vy = -ball.vy;
                    }

                    // Reduz HP do tijolo
                    brick.hp--;
                    if (brick.hp <= 0) {
                        brick.alive = false;
                        brokenBricks++;
                        score += 10 * level;
                        updateUI();
                        spawnParticles(bx2 + bw / 2, by2 + bh / 2, brick.color, 15);
                        checkWin();
                    } else {
                        // Mudança de cor para indicar dano
                        brick.color = '#888';
                        spawnParticles(bx2 + bw / 2, by2 + bh / 2, '#ffffff', 6);
                    }
                    break; // só processa um tijolo por frame
                }
            }

            // --- Atualiza partículas ---
            updateParticles();
        }

        // ================================================================
        //  7.  RENDERIZAÇÃO
        // ================================================================

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // --- Tijolos ---
            for (const brick of bricks) {
                if (!brick.alive) continue;
                const hpRatio = brick.hp / brick.maxHp;
                ctx.shadowColor = brick.color;
                ctx.shadowBlur = 10;
                ctx.fillStyle = brick.color;
                ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
                // Brilho
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(brick.x + 3, brick.y + 3, brick.w - 6, 4);
                // Se tiver mais de 1 HP, mostra um indicador
                if (brick.maxHp > 1) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(brick.hp, brick.x + brick.w / 2, brick.y + brick.h / 2 + 1);
                }
            }

            // --- Raquete ---
            ctx.shadowColor = '#6c6cff';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#6c6cff';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, PADDLE_W, PADDLE_H, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.roundRect(paddle.x + 6, paddle.y + 3, PADDLE_W - 12, 5, 4);
            ctx.fill();

            // --- Bola ---
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            // Brilho na bola
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(ball.x - 3, ball.y - 4, 3, 0, Math.PI * 2);
            ctx.fill();

            // --- Partículas ---
            drawParticles();

            // --- Game Over ---
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let msg = '💀 GAME OVER';
                if (lives <= 0) msg = '💀 GAME OVER';
                else if (level >= 5 && brokenBricks >= totalBricks) msg = '🏆 VOCÊ VENCEU!';
                ctx.fillText(msg, W / 2, H / 2 - 20);
                ctx.fillStyle = '#a0a0c0';
                ctx.font = '20px sans-serif';
                ctx.fillText('Clique em "Reiniciar" para jogar novamente', W / 2, H / 2 + 50);
            }

            // --- Pausa ---
            if (paused && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸ PAUSADO', W / 2, H / 2);
            }
        }

        // ================================================================
        //  8.  LOOP PRINCIPAL
        // ================================================================

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // ================================================================
        //  9.  EVENTOS
        // ================================================================

        // --- Mouse ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const x = (e.clientX - rect.left) * scaleX;
            mouseX = Math.max(0, Math.min(W - PADDLE_W, x - PADDLE_W / 2));
            // Se a bola estiver presa, ela segue a raquete
            if (ballStuck) {
                ball.x = paddle.x + PADDLE_W / 2;
            }
        });

        // --- Clique para lançar a bola ---
        canvas.addEventListener('click', () => {
            if (gameOver) return;
            if (ballStuck) {
                launchBall();
            }
        });

        // --- Toque (celular) ---
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            mouseX = Math.max(0, Math.min(W - PADDLE_W, x - PADDLE_W / 2));
            if (ballStuck) {
                ball.x = paddle.x + PADDLE_W / 2;
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver) return;
            if (ballStuck) {
                launchBall();
            }
            // Move a raquete para a posição do toque
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            mouseX = Math.max(0, Math.min(W - PADDLE_W, x - PADDLE_W / 2));
            if (ballStuck) {
                ball.x = paddle.x + PADDLE_W / 2;
            }
        }, { passive: false });

        // --- Teclado ---
        const keys = {};
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
            }
            keys[e.key] = true;
            if (e.key === 'ArrowLeft') mouseX = Math.max(0, paddle.x - 18);
            if (e.key === 'ArrowRight') mouseX = Math.min(W - PADDLE_W, paddle.x + 18);
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (gameOver) return;
                if (ballStuck) launchBall();
            }
            if (e.key === 'p' || e.key === 'P') togglePause();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Movimento contínuo com setas
        setInterval(() => {
            if (keys['ArrowLeft']) mouseX = Math.max(0, paddle.x - 10);
            if (keys['ArrowRight']) mouseX = Math.min(W - PADDLE_W, paddle.x + 10);
        }, 16);

        // --- Botões ---
        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            pauseBtn.textContent = paused ? '▶️ Retomar' : '⏸️ Pausar';
            draw();
        }

        function restartGame() {
            level = 1;
            lives = 3;
            score = 0;
            gameOver = false;
            paused = false;
            pauseBtn.textContent = '⏸️ Pausar';
            particles = [];
            buildBricks(level);
            brokenBricks = 0;
            paddle.x = W / 2 - PADDLE_W / 2;
            mouseX = paddle.x;
            resetBall(true);
            updateUI();
            draw();
        }

        restartBtn.addEventListener('click', restartGame);
        pauseBtn.addEventListener('click', togglePause);

        // ================================================================
        //  10. INICIALIZAR
        // ================================================================

        // Polyfill para roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        buildBricks(1);
        resetBall(true);
        updateUI();
        draw();
        gameLoop();
    </script>

</body>
</html>
