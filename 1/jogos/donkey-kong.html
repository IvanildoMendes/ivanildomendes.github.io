<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦍 Donkey Kong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0b0b16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .container {
            background: #1a1a2e;
            padding: 25px 30px 30px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 100%;
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0c0;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .info-bar span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }
        .info-bar .lives { color: #ff6b6b; }
        .info-bar .score { color: #ffd700; }
        .info-bar .level { color: #6c6cff; }

        #gameCanvas {
            background: #0b0b16;
            border-radius: 16px;
            border: 3px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            height: auto;
            aspect-ratio: 600 / 500;
            touch-action: none;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 18px;
        }
        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(108,108,255,0.15);
        }
        .controls button:active { transform: scale(0.95); }
        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .hint kbd {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            color: #c0c0e0;
            font-weight: 600;
        }
        /* Mobile D-Pad */
        .mobile-dpad {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 200px;
            margin: 12px auto 0;
        }
        .mobile-dpad button {
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            color: #fff;
            font-size: 1.6rem;
            padding: 8px 0;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.1s;
            box-shadow: 0 4px 0 #0f0f1a;
        }
        .mobile-dpad button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f1a;
        }
        .mobile-dpad .center { visibility: hidden; }
        .mobile-dpad .big { grid-column: span 2; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .info-bar { font-size: 0.9rem; }
            .controls button { padding: 8px 18px; font-size: 0.8rem; }
            .hint { font-size: 0.75rem; }
            .mobile-dpad { display: grid; }
        }
        @media (pointer: coarse) { .mobile-dpad { display: grid; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🦍 DONKEY KONG</h1>
    <div class="info-bar">
        <span class="score">🏆 <span id="scoreDisplay">0</span></span>
        <span class="level">⚡ Nível <span id="levelDisplay">1</span></span>
        <span class="lives">❤️ <span id="livesDisplay">3</span></span>
    </div>
    <canvas id="gameCanvas" width="600" height="500"></canvas>

    <div class="mobile-dpad">
        <button data-dir="left">◀</button>
        <button data-dir="up">▲</button>
        <button data-dir="right">▶</button>
        <button data-dir="down">▼</button>
        <button class="big" data-dir="jump">⬆ PULAR</button>
    </div>

    <div class="controls">
        <button id="restartBtn">🔄 Reiniciar</button>
        <button id="pauseBtn">⏸️ Pausar</button>
    </div>
    <div class="hint">
        <kbd>←</kbd> <kbd>→</kbd> andar &nbsp;·&nbsp; <kbd>↑</kbd> subir escada &nbsp;·&nbsp; <kbd>Espaço</kbd> pular &nbsp;·&nbsp; <kbd>P</kbd> pausa
    </div>
</div>

<script>
    // ================================================================
    //  1.  CONFIGURAÇÕES E MAPA
    // ================================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const levelSpan = document.getElementById('levelDisplay');
    const livesSpan = document.getElementById('livesDisplay');
    const restartBtn = document.getElementById('restartBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const W = 600, H = 500;
    const GRAVITY = 0.6;
    const JUMP_FORCE = -10;

    // --- Plataformas (x, y, w, h) ---
    // Nível 1: 4 plataformas + chão
    const PLATFORMS = [
        // chão (nível 0)
        { x: 0, y: 460, w: 600, h: 40 },
        // plataforma 1 (mais baixa)
        { x: 40, y: 390, w: 200, h: 14 },
        // plataforma 2 (meio)
        { x: 180, y: 310, w: 200, h: 14 },
        // plataforma 3 (superior)
        { x: 320, y: 230, w: 200, h: 14 },
        // plataforma do DK (topo)
        { x: 40, y: 150, w: 500, h: 14 }
    ];

    // --- Escadas (x, y, altura) ---
    // Cada escada é uma coluna de degraus (desenhada como uma linha vertical com traços)
    const LADDERS = [
        { x: 90, y: 390, h: 70 },   // sobe da plat1 para plat2
        { x: 260, y: 310, h: 80 },  // sobe da plat2 para plat3
        { x: 400, y: 230, h: 80 },  // sobe da plat3 para o topo
        { x: 160, y: 460, h: 70 },  // sobe do chão para plat1
        { x: 480, y: 230, h: 80 }   // escada extra no topo (opcional)
    ];

    // Posição da Pauline (topo)
    const PAULINE = { x: 480, y: 135 };

    // Posição do DK
    const DK = { x: 80, y: 130 };

    // ================================================================
    //  2.  ESTADO DO JOGO
    // ================================================================
    let mario = {
        x: 50, y: 435,  // posição em pixels
        w: 20, h: 26,
        vx: 0, vy: 0,
        onGround: false,
        onLadder: false,
        facing: 1, // 1=dir, -1=esq
        frame: 0,
        frameTimer: 0
    };

    let barrels = [];
    let particles = [];
    let score = 0;
    let lives = 3;
    let level = 1;
    let gameOver = false;
    let paused = false;
    let animationId = null;
    let barrelTimer = 0;
    const BARREL_INTERVAL = 90; // frames
    let barrelSpeed = 1.5;
    let onTop = false; // se Mario chegou ao topo

    // Controles
    let keys = {};

    // ================================================================
    //  3.  FUNÇÕES AUXILIARES
    // ================================================================

    function resetMario() {
        mario.x = 50;
        mario.y = 435;
        mario.vx = 0;
        mario.vy = 0;
        mario.onGround = false;
        mario.onLadder = false;
        mario.facing = 1;
        onTop = false;
    }

    function resetGame() {
        barrels = [];
        particles = [];
        score = 0;
        lives = 3;
        level = 1;
        gameOver = false;
        paused = false;
        pauseBtn.textContent = '⏸️ Pausar';
        barrelSpeed = 1.5;
        barrelTimer = 0;
        resetMario();
        updateUI();
        draw();
    }

    function updateUI() {
        scoreSpan.textContent = score;
        levelSpan.textContent = level;
        livesSpan.textContent = lives;
    }

    function spawnParticles(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * 2 * Math.PI;
            const speed = 1 + Math.random() * 3;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 0.5,
                life: 1,
                decay: 0.02 + Math.random() * 0.03,
                size: 2 + Math.random() * 4,
                color
            });
        }
    }

    function spawnBarrel() {
        // DK joga um barril do topo
        const x = DK.x + 20 + Math.random() * 60;
        const y = DK.y + 40;
        const dir = Math.random() > 0.5 ? 1 : -1;
        barrels.push({
            x: x,
            y: y,
            w: 18,
            h: 18,
            vx: dir * (barrelSpeed + Math.random() * 0.5),
            vy: 0,
            onGround: false,
            onLadder: false,
            frame: 0,
            fire: level >= 3 && Math.random() < 0.3 // barris em chamas a partir do nível 3
        });
    }

    // ================================================================
    //  4.  COLISÕES E FÍSICA
    // ================================================================

    function rectCollide(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x &&
               a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function isOnPlatform(entity, platform) {
        // Verifica se o entity está em cima da plataforma
        if (entity.vy >= 0 &&
            entity.x + entity.w > platform.x + 4 &&
            entity.x < platform.x + platform.w - 4 &&
            entity.y + entity.h >= platform.y &&
            entity.y + entity.h <= platform.y + platform.h + 6) {
            return true;
        }
        return false;
    }

    function isOnLadder(entity, ladder) {
        // Verifica se o entity está alinhado com a escada
        const cx = entity.x + entity.w/2;
        if (cx > ladder.x && cx < ladder.x + 12 &&
            entity.y + entity.h > ladder.y &&
            entity.y < ladder.y + ladder.h) {
            return true;
        }
        return false;
    }

    function moveEntity(entity, platforms, ladders) {
        // Aplica gravidade se não estiver na escada
        if (!entity.onLadder) {
            entity.vy += GRAVITY;
        }

        // Movimento horizontal
        entity.x += entity.vx;
        // Movimento vertical
        entity.y += entity.vy;

        // Colisão com plataformas (apenas se estiver caindo)
        entity.onGround = false;
        for (const p of platforms) {
            if (entity.vy >= 0 &&
                entity.x + entity.w > p.x + 4 &&
                entity.x < p.x + p.w - 4 &&
                entity.y + entity.h >= p.y &&
                entity.y + entity.h <= p.y + p.h + 8) {
                entity.y = p.y - entity.h;
                entity.vy = 0;
                entity.onGround = true;
            }
        }

        // Colisão com escadas (subir/descer)
        entity.onLadder = false;
        for (const l of ladders) {
            if (isOnLadder(entity, l)) {
                entity.onLadder = true;
                // Se estiver pressionando para cima ou baixo, move na escada
                if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                    entity.y -= 2.5;
                    entity.vy = 0;
                } else if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                    entity.y += 2.5;
                    entity.vy = 0;
                }
                // Alinha horizontalmente
                entity.x = l.x - entity.w/2 + 6;
                break;
            }
        }

        // Limites da tela
        if (entity.x < 0) entity.x = 0;
        if (entity.x + entity.w > W) entity.x = W - entity.w;
        if (entity.y < 0) { entity.y = 0; entity.vy = 0; }
        if (entity.y + entity.h > H) {
            entity.y = H - entity.h;
            entity.vy = 0;
            entity.onGround = true;
        }
    }

    // ================================================================
    //  5.  LÓGICA DO JOGO
    // ================================================================

    function update() {
        if (paused || gameOver) return;

        // --- Controle do Mario ---
        let moveX = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveX = -3.5;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) moveX = 3.5;
        mario.vx = moveX;
        if (moveX !== 0) mario.facing = moveX > 0 ? 1 : -1;

        // Pulo (apenas se no chão)
        if ((keys[' '] || keys['Space'] || keys['ArrowUp'] || keys['w'] || keys['W']) &&
            mario.onGround && !mario.onLadder) {
            mario.vy = JUMP_FORCE - 0.5 * level;
            mario.onGround = false;
        }

        // Atualiza animação
        if (Math.abs(mario.vx) > 0.5) {
            mario.frameTimer++;
            if (mario.frameTimer > 8) {
                mario.frameTimer = 0;
                mario.frame = (mario.frame + 1) % 4;
            }
        } else {
            mario.frame = 0;
            mario.frameTimer = 0;
        }

        // Move Mario
        moveEntity(mario, PLATFORMS, LADDERS);

        // Verifica se Mario chegou ao topo (na plataforma do DK e próximo à Pauline)
        if (mario.x + mario.w > PAULINE.x - 10 && mario.x < PAULINE.x + 20 &&
            mario.y + mario.h > PAULINE.y && mario.y < PAULINE.y + 20) {
            // Resgatou a Pauline!
            onTop = true;
            score += 100 * level;
            updateUI();
            spawnParticles(PAULINE.x, PAULINE.y, '#ffd700', 40);
            // Próximo nível
            level++;
            barrelSpeed = 1.5 + level * 0.2;
            BARREL_INTERVAL = Math.max(40, 90 - level * 5);
            resetMario();
            barrels = [];
            spawnParticles(mario.x, mario.y, '#6c6cff', 20);
            updateUI();
            // Uma vida extra a cada 2 níveis
            if (level % 2 === 0) {
                lives++;
                updateUI();
            }
            return;
        }

        // --- Barris ---
        barrelTimer++;
        if (barrelTimer >= BARREL_INTERVAL) {
            barrelTimer = 0;
            spawnBarrel();
            // Às vezes dois barris
            if (level > 2 && Math.random() < 0.2) spawnBarrel();
        }

        for (let i = barrels.length - 1; i >= 0; i--) {
            const b = barrels[i];
            // Física do barril (rola pelas plataformas)
            if (!b.onGround) {
                b.vy += GRAVITY;
            }
            b.x += b.vx;
            b.y += b.vy;

            // Colisão com plataformas
            b.onGround = false;
            for (const p of PLATFORMS) {
                if (b.vy >= 0 &&
                    b.x + b.w > p.x + 2 &&
                    b.x < p.x + p.w - 2 &&
                    b.y + b.h >= p.y &&
                    b.y + b.h <= p.y + p.h + 6) {
                    b.y = p.y - b.h;
                    b.vy = 0;
                    b.onGround = true;
                    // O barril rola para a direção que está indo
                    // Se chegar na borda da plataforma, pode cair
                }
            }

            // Se o barril saiu da tela
            if (b.x < -50 || b.x > W + 50 || b.y > H + 50) {
                barrels.splice(i, 1);
                continue;
            }

            // Colisão com Mario
            if (rectCollide(mario, b)) {
                // Mario foi atingido!
                spawnParticles(mario.x + mario.w/2, mario.y + mario.h/2, '#ff6b6b', 25);
                lives--;
                updateUI();
                if (lives <= 0) {
                    gameOver = true;
                    return;
                }
                resetMario();
                barrels = [];
                // Pequena invencibilidade (ignoramos por simplicidade)
                continue;
            }

            // Animação do barril (rola)
            b.frame = (b.frame + 0.1) % 4;
        }

        // --- Partículas ---
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.06;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // --- Mario caiu no vazio? ---
        if (mario.y > H + 50) {
            spawnParticles(mario.x + mario.w/2, H, '#ff6b6b', 20);
            lives--;
            updateUI();
            if (lives <= 0) gameOver = true;
            else resetMario();
        }
    }

    // ================================================================
    //  6.  RENDERIZAÇÃO
    // ================================================================

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // --- Fundo (céu) ---
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#0b0b2a');
        grad.addColorStop(1, '#1a1a3a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // --- Estrelas (decoração) ---
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        for (let i = 0; i < 40; i++) {
            const x = (i * 137 + 50) % W;
            const y = (i * 269 + 30) % H;
            ctx.fillRect(x, y, 1, 1);
        }

        // --- Plataformas ---
        for (const p of PLATFORMS) {
            // Sombra
            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(p.x + 2, p.y + 2, p.w, p.h);
            // Cor principal
            const gradP = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
            gradP.addColorStop(0, '#6a5a4a');
            gradP.addColorStop(1, '#3a2a1a');
            ctx.fillStyle = gradP;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            // Detalhe
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(p.x + 4, p.y + 2, p.w - 8, 4);
            // Rebites (decoração)
            ctx.fillStyle = '#8a7a6a';
            for (let i = 0; i < p.w; i += 30) {
                ctx.fillRect(p.x + i + 5, p.y + 4, 4, 4);
            }
        }

        // --- Escadas ---
        for (const l of LADDERS) {
            ctx.fillStyle = '#8a7a5a';
            // Degraus
            for (let y = l.y; y < l.y + l.h; y += 12) {
                ctx.fillRect(l.x, y, 12, 4);
                // Sombra
                ctx.fillStyle = '#6a5a3a';
                ctx.fillRect(l.x + 2, y + 2, 8, 2);
                ctx.fillStyle = '#8a7a5a';
            }
            // Hastes laterais
            ctx.fillStyle = '#6a5a3a';
            ctx.fillRect(l.x + 1, l.y, 2, l.h);
            ctx.fillRect(l.x + 9, l.y, 2, l.h);
        }

        // --- DK (Donkey Kong) ---
        // Corpo
        ctx.fillStyle = '#6a3a1a';
        ctx.fillRect(DK.x, DK.y, 40, 40);
        // Cabeça
        ctx.fillStyle = '#7a4a2a';
        ctx.fillRect(DK.x + 8, DK.y - 16, 24, 20);
        // Olhos
        ctx.fillStyle = '#fff';
        ctx.fillRect(DK.x + 12, DK.y - 12, 6, 6);
        ctx.fillRect(DK.x + 22, DK.y - 12, 6, 6);
        ctx.fillStyle = '#0b0b16';
        ctx.fillRect(DK.x + 14, DK.y - 10, 3, 3);
        ctx.fillRect(DK.x + 24, DK.y - 10, 3, 3);
        // Sobrancelhas (raiva)
        ctx.fillStyle = '#3a1a0a';
        ctx.fillRect(DK.x + 10, DK.y - 14, 8, 2);
        ctx.fillRect(DK.x + 22, DK.y - 14, 8, 2);
        // Chapéu (sinal de DK)
        ctx.fillStyle = '#8a2a1a';
        ctx.fillRect(DK.x + 8, DK.y - 20, 24, 6);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('DK', DK.x + 20, DK.y - 18);
        // Braço jogando barril
        ctx.fillStyle = '#6a3a1a';
        ctx.fillRect(DK.x + 34, DK.y + 8, 14, 8);

        // --- Pauline (princesa) ---
        // Corpo
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(PAULINE.x, PAULINE.y, 16, 22);
        // Cabeça
        ctx.fillStyle = '#ffb8ae';
        ctx.fillRect(PAULINE.x + 2, PAULINE.y - 8, 12, 10);
        // Cabelo
        ctx.fillStyle = '#8a2a1a';
        ctx.fillRect(PAULINE.x, PAULINE.y - 10, 16, 6);
        ctx.fillRect(PAULINE.x - 4, PAULINE.y - 4, 6, 8);
        ctx.fillRect(PAULINE.x + 14, PAULINE.y - 4, 6, 8);
        // Olhos
        ctx.fillStyle = '#0b0b16';
        ctx.fillRect(PAULINE.x + 4, PAULINE.y - 4, 2, 2);
        ctx.fillRect(PAULINE.x + 10, PAULINE.y - 4, 2, 2);
        // Coroa
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(PAULINE.x + 2, PAULINE.y - 12, 12, 4);
        ctx.fillRect(PAULINE.x + 4, PAULINE.y - 14, 2, 2);
        ctx.fillRect(PAULINE.x + 10, PAULINE.y - 14, 2, 2);
        // Vestido
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.moveTo(PAULINE.x - 4, PAULINE.y + 22);
        ctx.lineTo(PAULINE.x + 20, PAULINE.y + 22);
        ctx.lineTo(PAULINE.x + 8, PAULINE.y + 34);
        ctx.closePath();
        ctx.fill();

        // --- Barris ---
        for (const b of barrels) {
            const x = b.x, y = b.y;
            // Barril
            ctx.fillStyle = '#6a3a1a';
            ctx.beginPath();
            ctx.ellipse(x + b.w/2, y + b.h/2, b.w/2, b.h/2, 0, 0, Math.PI * 2);
            ctx.fill();
            // Aros
            ctx.strokeStyle = '#8a5a3a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(x + b.w/2, y + b.h/2, b.w/2 - 2, b.h/2 - 2, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Fogo (se for barril em chamas)
            if (b.fire) {
                ctx.fillStyle = '#ff6b2a';
                ctx.shadowColor = '#ff6b2a';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(x + b.w/2, y - 4, 6 + Math.random() * 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(x + b.w/2 - 2, y - 6, 3 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // --- Mario ---
        const mx = mario.x, my = mario.y;
        // Corpo
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(mx + 2, my + 10, 16, 14);
        // Cabeça
        ctx.fillStyle = '#ffb8ae';
        ctx.fillRect(mx + 2, my, 16, 12);
        // Boné
        ctx.fillStyle = '#ff4d4d';
        ctx.fillRect(mx + 2, my - 2, 16, 6);
        ctx.fillRect(mx, my + 2, 6, 4);
        // Olhos
        ctx.fillStyle = '#0b0b16';
        if (mario.facing > 0) {
            ctx.fillRect(mx + 12, my + 4, 3, 3);
            ctx.fillRect(mx + 6, my + 4, 3, 3);
        } else {
            ctx.fillRect(mx + 3, my + 4, 3, 3);
            ctx.fillRect(mx + 9, my + 4, 3, 3);
        }
        // Bigode
        ctx.fillStyle = '#3a1a0a';
        ctx.fillRect(mx + 4, my + 8, 12, 2);
        // Pernas (animação)
        ctx.fillStyle = '#1a3a8a';
        const legOffset = mario.frame % 2 === 0 ? 0 : 2;
        ctx.fillRect(mx + 2, my + 24, 6, 6 + legOffset);
        ctx.fillRect(mx + 12, my + 24, 6, 6 - legOffset);
        // Botas
        ctx.fillStyle = '#3a1a0a';
        ctx.fillRect(mx + 1, my + 28 + legOffset, 8, 4);
        ctx.fillRect(mx + 11, my + 28 - legOffset, 8, 4);

        // --- Partículas ---
        for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        // --- Game Over ---
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const msg = lives <= 0 ? '💀 GAME OVER' : '🏆 VOCÊ VENCEU!';
            ctx.fillText(msg, W/2, H/2 - 20);
            ctx.fillStyle = '#a0a0c0';
            ctx.font = '20px sans-serif';
            ctx.fillText('Clique em "Reiniciar"', W/2, H/2 + 50);
        }

        // --- Pausa ---
        if (paused && !gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 44px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⏸ PAUSADO', W/2, H/2);
        }

        // --- Dica de "Resgate" no topo ---
        if (!gameOver && !onTop) {
            ctx.fillStyle = 'rgba(255,215,0,0.3)';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('🦍 Resgate a Pauline!', W/2, 20);
        }
    }

    // ================================================================
    //  7.  LOOP PRINCIPAL
    // ================================================================

    function gameLoop() {
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    // ================================================================
    //  8.  EVENTOS
    // ================================================================

    // --- Teclado ---
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Space', 'p', 'P', 'w', 'W', 'a', 'A', 's', 'S', 'd', 'D'].includes(key)) {
            e.preventDefault();
        }
        keys[key] = true;
        if (key === 'p' || key === 'P') togglePause();
    });

    document.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    // --- Botões mobile ---
    document.querySelectorAll('[data-dir]').forEach(btn => {
        btn.addEventListener('click', () => {
            const dir = btn.dataset.dir;
            if (dir === 'left') { keys['ArrowLeft'] = true; setTimeout(() => keys['ArrowLeft'] = false, 150); }
            else if (dir === 'right') { keys['ArrowRight'] = true; setTimeout(() => keys['ArrowRight'] = false, 150); }
            else if (dir === 'up') { keys['ArrowUp'] = true; setTimeout(() => keys['ArrowUp'] = false, 150); }
            else if (dir === 'down') { keys['ArrowDown'] = true; setTimeout(() => keys['ArrowDown'] = false, 150); }
            else if (dir === 'jump') { keys[' '] = true; setTimeout(() => keys[' '] = false, 100); }
        });
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const dir = btn.dataset.dir;
            if (dir === 'left') { keys['ArrowLeft'] = true; setTimeout(() => keys['ArrowLeft'] = false, 150); }
            else if (dir === 'right') { keys['ArrowRight'] = true; setTimeout(() => keys['ArrowRight'] = false, 150); }
            else if (dir === 'up') { keys['ArrowUp'] = true; setTimeout(() => keys['ArrowUp'] = false, 150); }
            else if (dir === 'down') { keys['ArrowDown'] = true; setTimeout(() => keys['ArrowDown'] = false, 150); }
            else if (dir === 'jump') { keys[' '] = true; setTimeout(() => keys[' '] = false, 100); }
        });
    });

    // --- Botões principais ---
    function togglePause() {
        if (gameOver) return;
        paused = !paused;
        pauseBtn.textContent = paused ? '▶️ Retomar' : '⏸️ Pausar';
        draw();
    }

    restartBtn.addEventListener('click', resetGame);
    pauseBtn.addEventListener('click', togglePause);

    // ================================================================
    //  9.  INICIALIZAR
    // ================================================================

    resetGame();
    gameLoop();
</script>
</body>
</html>
