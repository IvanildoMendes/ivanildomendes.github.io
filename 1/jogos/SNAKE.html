<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 Jogo da Cobrinha (Snake)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            border: 1px solid #2a2a4a;
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            color: #a0a0c0;
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        .info span {
            background: #0f0f1a;
            padding: 5px 20px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }
        #gameCanvas {
            background: #0f0f1a;
            border-radius: 16px;
            border: 2px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        button:hover {
            background: #4a4a8a;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 74, 138, 0.4);
        }
        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        @media (max-width: 500px) {
            .container { padding: 15px; }
            #gameCanvas { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐍 SNAKE</h1>
        <div class="info">
            <span>🏆 <span id="scoreDisplay">0</span></span>
            <span id="statusDisplay">▶️ Jogando</span>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="restartBtn">🔄 Reiniciar</button>
        </div>
        <div class="hint">⬆️ ⬇️ ⬅️ ➡️  (Setas do teclado)</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusSpan = document.getElementById('statusDisplay');

        // Configurações
        const GRID_SIZE = 20;       // 20x20 grid
        const CELL_SIZE = canvas.width / GRID_SIZE;

        // Variáveis do jogo
        let snake = [];
        let food = {};
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let gameOver = false;
        let win = false;
        let gameInterval = null;
        const MOVE_INTERVAL_MS = 150;

        // Inicializa o jogo
        function initGame() {
            // Cobra começa com 3 pedaços no meio
            const startX = Math.floor(GRID_SIZE / 2);
            const startY = Math.floor(GRID_SIZE / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            gameOver = false;
            win = false;
            statusSpan.textContent = '▶️ Jogando';
            statusSpan.style.color = '#a0a0c0';
            updateScore();
            spawnFood();
            drawCanvas();

            // Reseta o timer se existir
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            gameInterval = setInterval(gameTick, MOVE_INTERVAL_MS);
        }

        // Spawna a comida em lugar vazio
        function spawnFood() {
            const totalCells = GRID_SIZE * GRID_SIZE;
            if (snake.length >= totalCells) {
                // Ganhou! Preencheu o tabuleiro
                win = true;
                gameOver = true;
                statusSpan.textContent = '🏆 VOCÊ VENCEU!';
                statusSpan.style.color = '#ffd700';
                clearInterval(gameInterval);
                gameInterval = null;
                drawCanvas();
                return;
            }

            let newFood = null;
            let attempts = 0;
            const maxAttempts = 1000;
            while (!newFood && attempts < maxAttempts) {
                const randX = Math.floor(Math.random() * GRID_SIZE);
                const randY = Math.floor(Math.random() * GRID_SIZE);
                if (!snake.some(segment => segment.x === randX && segment.y === randY)) {
                    newFood = { x: randX, y: randY };
                }
                attempts++;
            }
            // Se não achar (quase impossível), coloca no canto
            if (!newFood) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (!snake.some(s => s.x === x && s.y === y)) {
                            newFood = { x, y };
                            break;
                        }
                    }
                    if (newFood) break;
                }
            }
            food = newFood;
        }

        // Atualiza o placar
        function updateScore() {
            scoreSpan.textContent = score;
        }

        // Lógica do "tick" do jogo
        function gameTick() {
            if (gameOver) return;

            // Atualiza a direção (impede voltar sobre si mesmo)
            if (nextDirection === 'UP' && direction !== 'DOWN') direction = nextDirection;
            else if (nextDirection === 'DOWN' && direction !== 'UP') direction = nextDirection;
            else if (nextDirection === 'LEFT' && direction !== 'RIGHT') direction = nextDirection;
            else if (nextDirection === 'RIGHT' && direction !== 'LEFT') direction = nextDirection;

            // Calcula nova cabeça
            const head = snake[0];
            let newHead = { ...head };
            switch (direction) {
                case 'RIGHT': newHead.x++; break;
                case 'LEFT': newHead.x--; break;
                case 'UP': newHead.y--; break;
                case 'DOWN': newHead.y++; break;
            }

            // Verifica se comeu a comida
            const ateFood = (newHead.x === food.x && newHead.y === food.y);

            // Monta a nova cobra (copia a atual)
            let newSnake = [newHead, ...snake];

            if (ateFood) {
                // Comeu: mantém a cauda (não remove o último)
                // A cobra cresce
                score++;
                updateScore();
                // A nova snake já tem a cabeça + corpo antigo completo (cresceu)
            } else {
                // Não comeu: remove a cauda
                newSnake.pop();
            }

            // Verifica colisão com paredes
            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                endGame();
                return;
            }

            // Verifica colisão com o próprio corpo (ignora a cabeça no índice 0)
            const collidesWithSelf = newSnake.slice(1).some(segment => segment.x === newHead.x && segment.y === newHead.y);
            if (collidesWithSelf) {
                endGame();
                return;
            }

            // Atualiza a cobra
            snake = newSnake;

            // Se comeu, gera nova comida
            if (ateFood) {
                spawnFood();
                // Se spawnFood detectou vitória (gameOver = true), para aqui
                if (gameOver) {
                    drawCanvas();
                    return;
                }
            }

            drawCanvas();
        }

        function endGame() {
            if (gameOver) return;
            gameOver = true;
            statusSpan.textContent = '💀 GAME OVER';
            statusSpan.style.color = '#ff6b6b';
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            drawCanvas();
        }

        // Desenha o jogo no canvas
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha grid (fraquinho)
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // Desenha a cobra
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const padding = isHead ? 2 : 4;
                const radius = 6;

                ctx.shadowColor = isHead ? '#6c6cff' : '#2a2a6a';
                ctx.shadowBlur = isHead ? 15 : 5;

                // Cor gradiente
                const gradient = ctx.createRadialGradient(
                    x + CELL_SIZE / 2, y + CELL_SIZE / 2, 2,
                    x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE / 2
                );
                if (isHead) {
                    gradient.addColorStop(0, '#8a8aff');
                    gradient.addColorStop(1, '#4a4a8a');
                } else {
                    gradient.addColorStop(0, '#6a6aaa');
                    gradient.addColorStop(1, '#2a2a5a');
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, radius);
                ctx.fill();

                // Olhos na cabeça
                if (isHead) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    let eyeOffset = 6;
                    let eyeSize = 4;
                    if (direction === 'RIGHT') {
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 10, y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 10, y + CELL_SIZE - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 8, y + 6, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 8, y + CELL_SIZE - 6, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'LEFT') {
                        ctx.beginPath();
                        ctx.arc(x + 10, y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 10, y + CELL_SIZE - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + 8, y + 6, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + 8, y + CELL_SIZE - 6, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'UP') {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 10, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 6, y + 10, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 8, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 6, y + 8, 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction === 'DOWN') {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + CELL_SIZE - 10, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 6, y + CELL_SIZE - 10, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#111';
                        ctx.beginPath();
                        ctx.arc(x + 6, y + CELL_SIZE - 8, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE - 6, y + CELL_SIZE - 8, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            // Desenha a comida (maçã estilizada)
            if (food && !win) {
                const fx = food.x * CELL_SIZE + CELL_SIZE / 2;
                const fy = food.y * CELL_SIZE + CELL_SIZE / 2;
                ctx.shadowColor = '#ff4d4d';
                ctx.shadowBlur = 20;

                // Corpo da maçã
                const gradient = ctx.createRadialGradient(fx - 4, fy - 4, 2, fx, fy, CELL_SIZE / 2);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(1, '#cc0000');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(fx, fy, CELL_SIZE / 2 - 3, 0, Math.PI * 2);
                ctx.fill();

                // Brilho
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(fx - 4, fy - 5, 4, 0, Math.PI * 2);
                ctx.fill();

                // Cabo
                ctx.strokeStyle = '#2d8a4e';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(fx + 4, fy - 10);
                ctx.lineTo(fx + 10, fy - 16);
                ctx.stroke();
                // Folha
                ctx.fillStyle = '#2d8a4e';
                ctx.beginPath();
                ctx.ellipse(fx + 12, fy - 16, 5, 3, 0.5, 0, Math.PI * 2);
                ctx.fill();
            }

            if (gameOver && !win) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💀 GAME OVER', canvas.width / 2, canvas.height / 2);
            } else if (win) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏆 VOCÊ VENCEU!', canvas.width / 2, canvas.height / 2);
            }

            ctx.shadowBlur = 0;
        }

        // Polyfill para roundRect (caso o navegador não tenha)
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        // Controles de teclado
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            e.preventDefault(); // Evita scroll
            if (key === 'ArrowUp') nextDirection = 'UP';
            else if (key === 'ArrowDown') nextDirection = 'DOWN';
            else if (key === 'ArrowLeft') nextDirection = 'LEFT';
            else if (key === 'ArrowRight') nextDirection = 'RIGHT';
            // Espaço reinicia
            if (key === ' ' || key === 'Space') {
                e.preventDefault();
                restartGame();
            }
        });

        // Botão reiniciar
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        function restartGame() {
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            initGame();
        }

        // Inicia o jogo
        initGame();
    </script>
</body>
</html>
