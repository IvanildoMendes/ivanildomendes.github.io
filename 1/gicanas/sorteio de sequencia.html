<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sorteador de Times</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f6fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            color: #1a1a2e;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 16px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        .header {
            text-align: center;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #16213e;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #546e7a;
            margin-top: 0.3rem;
        }

        /* Seleção de quantidade */
        .qtd-selector {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: #f0f4ff;
            border-radius: 1.5rem;
            padding: 1.2rem;
        }

        .qtd-label {
            font-weight: 600;
            color: #37474f;
            font-size: 1.1rem;
        }

        .qtd-input {
            width: 80px;
            padding: 0.8rem 0.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            font-size: 1.2rem;
            text-align: center;
            font-family: inherit;
            background: white;
            transition: border 0.2s;
        }

        .qtd-input:focus {
            border-color: #3a56e4;
            outline: none;
            box-shadow: 0 0 0 3px rgba(58,86,228,0.2);
        }

        .btn {
            border: none;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2.5rem;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            background: white;
            color: #1e293b;
            border: 2px solid #e2e8f0;
        }

        .btn-primary {
            background: #3a56e4;
            color: white;
            border: 2px solid #3a56e4;
            box-shadow: 0 4px 14px rgba(58, 86, 228, 0.3);
        }

        .btn-primary:hover {
            background: #2c44c9;
            border-color: #2c44c9;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #cfd8dc;
        }

        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #90a4ae;
        }

        .btn-large {
            width: 100%;
            padding: 1rem;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .btn-small {
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.2);
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            font-weight: 500;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* Área dos times */
        .teams-area {
            background: #f8faff;
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .teams-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
        }

        .team-input-group {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: white;
            padding: 0.4rem 0.8rem;
            border-radius: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .team-input-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #455a64;
        }

        .team-input-group input {
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 0.4rem;
            width: 120px;
            font-family: inherit;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: border 0.2s;
        }

        .team-input-group input:focus {
            border-bottom-color: #3a56e4;
        }

        /* Resultado */
        .result-box {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }

        .result-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #16213e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .result-list {
            list-style: none;
            counter-reset: position;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .result-list li {
            counter-increment: position;
            background: #f0f4ff;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .result-list li::before {
            content: counter(position) "º";
            background: #3a56e4;
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .result-list li.highlight {
            background: #e8eaf6;
            border-left: 4px solid #3a56e4;
        }

        .actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        @media (max-width: 500px) {
            .container {
                padding: 1.2rem;
            }
            .title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">🎲 Sorteador de Times</h1>
            <p class="subtitle">Substitua o par ou ímpar e defina a ordem dos jogos</p>
        </header>

        <!-- Seleção da quantidade de times -->
        <div class="qtd-selector">
            <label class="qtd-label" for="qtd-times">Quantos times?</label>
            <input type="number" id="qtd-times" class="qtd-input" value="2" min="2" max="10">
            <button id="btn-gerar-inputs" class="btn btn-outline btn-small">✏️ Atualizar nomes</button>
        </div>

        <!-- Área onde os inputs dos times aparecem -->
        <div id="teams-area" class="teams-area">
            <div class="teams-grid" id="teams-grid">
                <!-- Gerado dinamicamente -->
            </div>
        </div>

        <!-- Mensagem de erro -->
        <p id="error-msg" class="error-message hidden"></p>

        <!-- Botão de sortear -->
        <button id="btn-sortear" class="btn btn-primary btn-large">🎯 Sortear Ordem</button>

        <!-- Resultado -->
        <div id="result-container" class="result-box hidden">
            <h2 class="result-title">📋 Ordem Sorteada</h2>
            <ol id="result-list" class="result-list"></ol>
            <div class="actions" style="margin-top: 1rem;">
                <button id="btn-sortear-novamente" class="btn btn-primary">🔄 Sortear Novamente</button>
                <button id="btn-limpar" class="btn btn-outline">🧹 Limpar</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Elementos do DOM
            const qtdTimesInput = document.getElementById('qtd-times');
            const btnGerarInputs = document.getElementById('btn-gerar-inputs');
            const teamsGrid = document.getElementById('teams-grid');
            const btnSortear = document.getElementById('btn-sortear');
            const errorMsg = document.getElementById('error-msg');
            const resultContainer = document.getElementById('result-container');
            const resultList = document.getElementById('result-list');
            const btnSortearNovamente = document.getElementById('btn-sortear-novamente');
            const btnLimpar = document.getElementById('btn-limpar');

            let quantidadeAtual = 2;

            // Função para gerar os campos de nomes dos times
            function gerarCamposTimes(quantidade) {
                teamsGrid.innerHTML = '';
                for (let i = 1; i <= quantidade; i++) {
                    const div = document.createElement('div');
                    div.className = 'team-input-group';
                    div.innerHTML = `
                        <label>Time ${i}:</label>
                        <input type="text" class="team-name" placeholder="Nome do time ${i}" value="Time ${i}">
                    `;
                    teamsGrid.appendChild(div);
                }
                quantidadeAtual = quantidade;
                // Oculta resultado anterior ao mudar quantidade
                resultContainer.classList.add('hidden');
                errorMsg.classList.add('hidden');
            }

            // Inicializa com 2 times
            gerarCamposTimes(2);

            // Atualizar campos ao clicar no botão "Atualizar nomes"
            btnGerarInputs.addEventListener('click', () => {
                let qtd = parseInt(qtdTimesInput.value, 10);
                if (isNaN(qtd) || qtd < 2 || qtd > 10) {
                    errorMsg.textContent = 'Escolha entre 2 e 10 times.';
                    errorMsg.classList.remove('hidden');
                    return;
                }
                errorMsg.classList.add('hidden');
                gerarCamposTimes(qtd);
            });

            // Também atualiza ao pressionar Enter no campo de quantidade (opcional)
            qtdTimesInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    btnGerarInputs.click();
                }
            });

            // Função para embaralhar array (Fisher-Yates)
            function embaralharArray(arr) {
                const novo = [...arr];
                for (let i = novo.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [novo[i], novo[j]] = [novo[j], novo[i]];
                }
                return novo;
            }

            // Função para realizar o sorteio
            function sortearOrdem() {
                // Coleta os nomes dos inputs
                const inputs = document.querySelectorAll('.team-name');
                const nomes = [];
                inputs.forEach(input => {
                    const nome = input.value.trim();
                    nomes.push(nome || `Time ${nomades.length + 1}`); // fallback
                });

                if (nomes.length < 2) {
                    errorMsg.textContent = 'É necessário pelo menos 2 times.';
                    errorMsg.classList.remove('hidden');
                    return;
                }

                // Verifica nomes duplicados (opcional, apenas aviso)
                const nomesUnicos = new Set(nomes);
                if (nomesUnicos.size < nomes.length) {
                    errorMsg.textContent = 'Aviso: Existem nomes duplicados. Considere diferenciá-los.';
                    errorMsg.classList.remove('hidden');
                } else {
                    errorMsg.classList.add('hidden');
                }

                // Embaralha a lista
                const sorteado = embaralharArray(nomes);

                // Exibe o resultado
                resultList.innerHTML = '';
                sorteado.forEach((nome, index) => {
                    const li = document.createElement('li');
                    li.textContent = nome;
                    if (index === 0) {
                        li.classList.add('highlight'); // destaca o primeiro
                    }
                    resultList.appendChild(li);
                });

                resultContainer.classList.remove('hidden');
            }

            // Evento do botão principal Sortear
            btnSortear.addEventListener('click', sortearOrdem);

            // Sortear novamente (mantém os nomes)
            btnSortearNovamente.addEventListener('click', sortearOrdem);

            // Limpar resultado
            btnLimpar.addEventListener('click', () => {
                resultContainer.classList.add('hidden');
                errorMsg.classList.add('hidden');
            });

        })();
    </script>
</body>
</html>
