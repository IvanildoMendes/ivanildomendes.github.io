<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👾 Galaga</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0b0b16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: #1a1a2e;
            padding: 25px 30px 30px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 100%;
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0c0;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .info-bar span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }
        .info-bar .lives { color: #ff6b6b; }
        .info-bar .score { color: #ffd700; }
        .info-bar .level { color: #6c6cff; }

        #gameCanvas {
            background: #0b0b16;
            border-radius: 16px;
            border: 3px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 700px;
            height: auto;
            aspect-ratio: 700 / 500;
            touch-action: none;
            cursor: none;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 18px;
        }
        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(108,108,255,0.15);
        }
        .controls button:active { transform: scale(0.95); }
        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .hint kbd {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            color: #c0c0e0;
            font-weight: 600;
        }
        /* Mobile D-Pad */
        .mobile-dpad {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            max-width: 180px;
            margin: 12px auto 0;
        }
        .mobile-dpad button {
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            color: #fff;
            font-size: 1.6rem;
            padding: 8px 0;
            cursor: pointer;
            touch-action: manipulation;
            transition: 0.1s;
            box-shadow: 0 4px 0 #0f0f1a;
        }
        .mobile-dpad button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f1a;
        }
        .mobile-dpad .center { visibility: hidden; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .info-bar { font-size: 0.9rem; }
            .controls button { padding: 8px 18px; font-size: 0.8rem; }
            .hint { font-size: 0.75rem; }
            .mobile-dpad { display: grid; }
        }
        @media (pointer: coarse) { .mobile-dpad { display: grid; } }
    </style>
</head>
<body>
<div class="container">
    <h1>👾 GALAGA</h1>
    <div class="info-bar">
        <span class="score">🏆 <span id="scoreDisplay">0</span></span>
        <span class="level">⚡ Nível <span id="levelDisplay">1</span></span>
        <span class="lives">❤️ <span id="livesDisplay">3</span></span>
    </div>
    <canvas id="gameCanvas" width="700" height="500"></canvas>

    <div class="mobile-dpad">
        <button data-dir="left">◀</button>
        <button class="center"></button>
        <button data-dir="right">▶</button>
        <button data-dir="shoot" style="grid-column: span 3;">🔫 ATIRAR</button>
    </div>

    <div class="controls">
        <button id="restartBtn">🔄 Reiniciar</button>
        <button id="pauseBtn">⏸️ Pausar</button>
    </div>
    <div class="hint">
        <kbd>←</kbd> <kbd>→</kbd> mover &nbsp;·&nbsp; <kbd>Espaço</kbd> atirar &nbsp;·&nbsp; <kbd>P</kbd> pausa
    </div>
</div>

<script>
// ============================================================
//  CONFIGURAÇÕES
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');
const levelSpan = document.getElementById('levelDisplay');
const livesSpan = document.getElementById('livesDisplay');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.getElementById('pauseBtn');

const W = 700, H = 500;
const PLAYER_W = 30, PLAYER_H = 28;
const PLAYER_Y = H - 50;
const BULLET_SPEED = 6;
const ENEMY_ROWS = 5;
const ENEMY_COLS = 8;
const ENEMY_W = 28, ENEMY_H = 26;
const ENEMY_GAP = 6;

// Cores dos inimigos (por linha)
const ENEMY_COLORS = ['#ff6b6b', '#ffa94d', '#ffd93d', '#6bcb77', '#4d96ff'];

// ============================================================
//  ESTADO
// ============================================================
let player = { x: W/2 - PLAYER_W/2, y: PLAYER_Y };
let enemies = [];
let bullets = [];
let enemyBullets = [];
let particles = [];
let stars = [];
let score = 0;
let lives = 3;
let level = 1;
let gameOver = false;
let paused = false;
let animationId = null;
let shootCooldown = 0;
const SHOOT_DELAY = 10;

// Movimento da formação
let formationDir = 1;
let formationSpeed = 0.8;
let formationMoveCounter = 0;
let formationMoveInterval = 25;

// Invasores mergulhadores
let divers = [];
let diveTimer = 0;
const DIVE_INTERVAL = 120; // frames entre mergulhos

// Controle do jogador
let targetX = player.x;

// ============================================================
//  FUNÇÕES AUXILIARES
// ============================================================
function createStars() {
    stars = [];
    for (let i = 0; i < 100; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            size: 0.5 + Math.random() * 1.5,
            speed: 0.2 + Math.random() * 0.5,
            brightness: 0.3 + Math.random() * 0.7
        });
    }
}

function buildEnemies() {
    enemies = [];
    const totalWidth = ENEMY_COLS * (ENEMY_W + ENEMY_GAP) - ENEMY_GAP;
    const offsetX = (W - totalWidth) / 2;
    for (let r = 0; r < ENEMY_ROWS; r++) {
        for (let c = 0; c < ENEMY_COLS; c++) {
            enemies.push({
                x: offsetX + c * (ENEMY_W + ENEMY_GAP),
                y: 40 + r * (ENEMY_H + ENEMY_GAP),
                w: ENEMY_W, h: ENEMY_H,
                color: ENEMY_COLORS[r % ENEMY_COLORS.length],
                row: r,
                alive: true,
                frame: Math.floor(Math.random() * 2),
                diveTimer: 0
            });
        }
    }
}

function resetGame() {
    player.x = W/2 - PLAYER_W/2;
    targetX = player.x;
    bullets = [];
    enemyBullets = [];
    divers = [];
    particles = [];
    score = 0;
    lives = 3;
    level = 1;
    gameOver = false;
    paused = false;
    pauseBtn.textContent = '⏸️ Pausar';
    shootCooldown = 0;
    formationDir = 1;
    formationSpeed = 0.8;
    formationMoveCounter = 0;
    formationMoveInterval = 25;
    diveTimer = 0;
    buildEnemies();
    updateUI();
    draw();
}

function updateUI() {
    scoreSpan.textContent = score;
    levelSpan.textContent = level;
    livesSpan.textContent = lives;
}

function spawnExplosion(x, y, color, count = 20) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * 2 * Math.PI;
        const speed = 1.5 + Math.random() * 4;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 0.5,
            life: 1,
            decay: 0.015 + Math.random() * 0.025,
            size: 2 + Math.random() * 4,
            color
        });
    }
}

// ============================================================
//  TIROS
// ============================================================
function playerShoot() {
    if (gameOver || paused) return;
    if (shootCooldown > 0) return;
    bullets.push({
        x: player.x + PLAYER_W/2 - 3,
        y: player.y - 8,
        w: 6, h: 14,
        speed: BULLET_SPEED
    });
    shootCooldown = SHOOT_DELAY;
}

function enemyShoot(enemy) {
    enemyBullets.push({
        x: enemy.x + ENEMY_W/2 - 4,
        y: enemy.y + ENEMY_H,
        w: 8, h: 10,
        speed: 2 + level * 0.2
    });
}

// ============================================================
//  MERGULHO (DIVE)
// ============================================================
function startDive() {
    // Escolhe um inimigo vivo aleatório
    const alive = enemies.filter(e => e.alive);
    if (alive.length === 0) return;
    const enemy = alive[Math.floor(Math.random() * alive.length)];
    // Calcula trajetória até o jogador
    const startX = enemy.x + ENEMY_W/2;
    const startY = enemy.y + ENEMY_H/2;
    const targetX = player.x + PLAYER_W/2;
    const targetY = player.y + PLAYER_H/2;
    const dx = targetX - startX;
    const dy = targetY - startY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const speed = 3 + level * 0.3;
    divers.push({
        x: startX,
        y: startY,
        vx: (dx / dist) * speed,
        vy: (dy / dist) * speed,
        color: enemy.color,
        alive: true,
        // O inimigo original morre? No Galaga, ele sai da formação e vira um dive.
        // Vamos marcar como morto na formação.
        enemyRef: enemy
    });
    enemy.alive = false;
}

// ============================================================
//  ATUALIZAÇÃO
// ============================================================
function update() {
    if (paused || gameOver) return;

    // --- Estrelas ---
    for (const star of stars) {
        star.y += star.speed;
        if (star.y > H) { star.y = 0; star.x = Math.random() * W; }
    }

    // --- Jogador ---
    player.x += (targetX - player.x) * 0.18;
    player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));

    // --- Cooldown do tiro ---
    if (shootCooldown > 0) shootCooldown--;

    // --- Movimento da formação ---
    formationMoveCounter++;
    if (formationMoveCounter >= formationMoveInterval) {
        formationMoveCounter = 0;
        let shouldReverse = false;
        for (const e of enemies) {
            if (!e.alive) continue;
            if (formationDir === 1 && e.x + e.w >= W - 10) shouldReverse = true;
            if (formationDir === -1 && e.x <= 10) shouldReverse = true;
            if (e.y + e.h >= player.y - 10) {
                gameOver = true;
                return;
            }
        }
        if (shouldReverse) {
            formationDir *= -1;
            for (const e of enemies) {
                if (e.alive) e.y += 6;
            }
        } else {
            for (const e of enemies) {
                if (e.alive) e.x += formationDir * formationSpeed;
            }
        }
        // Alterna frame de animação
        for (const e of enemies) {
            if (e.alive) e.frame = 1 - e.frame;
        }
    }

    // --- Inimigos atiram (aleatório) ---
    const aliveEnemies = enemies.filter(e => e.alive);
    if (aliveEnemies.length > 0 && Math.random() < 0.015 + level * 0.002) {
        const shooter = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
        enemyShoot(shooter);
    }

    // --- Mergulhos ---
    diveTimer++;
    if (diveTimer >= DIVE_INTERVAL && aliveEnemies.length > 0) {
        diveTimer = 0;
        // Número de mergulhos por vez (aumenta com nível)
        const diveCount = Math.min(1 + Math.floor(level / 2), 3);
        for (let i = 0; i < diveCount; i++) {
            if (aliveEnemies.length > 0) startDive();
        }
    }

    // --- Atualiza mergulhadores ---
    for (let i = divers.length - 1; i >= 0; i--) {
        const d = divers[i];
        if (!d.alive) { divers.splice(i, 1); continue; }
        d.x += d.vx;
        d.y += d.vy;
        // Se saiu da tela ou passou do jogador
        if (d.y > H + 20 || d.x < -20 || d.x > W + 20) {
            d.alive = false;
            divers.splice(i, 1);
            continue;
        }
        // Colisão com o jogador
        const dx = d.x - (player.x + PLAYER_W/2);
        const dy = d.y - (player.y + PLAYER_H/2);
        if (Math.sqrt(dx*dx + dy*dy) < 20) {
            // Atingiu o jogador
            d.alive = false;
            divers.splice(i, 1);
            loseLife();
            if (gameOver) return;
        }
    }

    // --- Atualiza tiros do jogador ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y -= b.speed;
        if (b.y + b.h < 0) { bullets.splice(i, 1); continue; }
        let hit = false;
        // Colisão com inimigos na formação
        for (const e of enemies) {
            if (!e.alive) continue;
            if (b.x < e.x + e.w && b.x + b.w > e.x &&
                b.y < e.y + e.h && b.y + b.h > e.y) {
                e.alive = false;
                hit = true;
                score += (ENEMY_ROWS - e.row) * 10 + 5;
                updateUI();
                spawnExplosion(e.x + e.w/2, e.y + e.h/2, e.color);
                break;
            }
        }
        // Colisão com mergulhadores
        if (!hit) {
            for (const d of divers) {
                if (!d.alive) continue;
                if (b.x < d.x + 16 && b.x + b.w > d.x - 16 &&
                    b.y < d.y + 16 && b.y + b.h > d.y - 16) {
                    d.alive = false;
                    hit = true;
                    score += 30;
                    updateUI();
                    spawnExplosion(d.x, d.y, d.color, 25);
                    break;
                }
            }
        }
        if (hit) {
            bullets.splice(i, 1);
        }
    }

    // --- Atualiza tiros inimigos ---
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.y += b.speed;
        if (b.y > H) { enemyBullets.splice(i, 1); continue; }
        // Colisão com o jogador
        if (b.x < player.x + PLAYER_W && b.x + b.w > player.x &&
            b.y < player.y + PLAYER_H && b.y + b.h > player.y) {
            enemyBullets.splice(i, 1);
            loseLife();
            if (gameOver) return;
        }
    }

    // --- Verifica se todos os inimigos foram destruídos ---
    const remaining = enemies.filter(e => e.alive).length;
    if (remaining === 0 && divers.length === 0) {
        // Próximo nível
        level++;
        updateUI();
        formationSpeed = 0.8 + level * 0.1;
        formationMoveInterval = Math.max(12, 25 - level * 1.5);
        buildEnemies();
        // Recupera uma vida se perdeu alguma (bônus)
        if (lives < 5) lives++;
        updateUI();
        spawnExplosion(W/2, H/2, '#ffd700', 40);
    }

    // --- Atualiza partículas ---
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // --- Verifica game over por falta de vidas ---
    if (lives <= 0) gameOver = true;
}

function loseLife() {
    lives--;
    updateUI();
    spawnExplosion(player.x + PLAYER_W/2, player.y + PLAYER_H/2, '#ff6b6b', 30);
    if (lives <= 0) {
        gameOver = true;
        return;
    }
    // Reseta posição
    player.x = W/2 - PLAYER_W/2;
    targetX = player.x;
    // Limpa tiros inimigos para dar respiro
    enemyBullets = [];
}

// ============================================================
//  RENDERIZAÇÃO
// ============================================================
function draw() {
    ctx.clearRect(0, 0, W, H);

    // --- Estrelas ---
    for (const star of stars) {
        ctx.globalAlpha = star.brightness;
        ctx.fillStyle = '#fff';
        ctx.fillRect(star.x, star.y, star.size, star.size);
    }
    ctx.globalAlpha = 1;

    // --- Inimigos (formação) ---
    for (const e of enemies) {
        if (!e.alive) continue;
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = e.color;
        const x = e.x, y = e.y, w = e.w, h = e.h;
        // Corpo
        ctx.beginPath();
        ctx.roundRect(x, y + 4, w, h - 8, 4);
        ctx.fill();
        // Cabeça
        ctx.beginPath();
        ctx.arc(x + w/2, y + 6, 10, Math.PI, 0, false);
        ctx.fill();
        // Olhos
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0b0b16';
        const offset = e.frame === 0 ? 0 : 2;
        ctx.fillRect(x + 7 + offset, y + 4, 4, 5);
        ctx.fillRect(x + w - 11 + offset, y + 4, 4, 5);
        // Brilho
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(x + 6 + offset, y + 4, 2, 2);
        ctx.fillRect(x + w - 12 + offset, y + 4, 2, 2);
        // Antenas (linha superior)
        if (e.row === 0) {
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + 5, y + 2);
            ctx.lineTo(x + 1, y - 4);
            ctx.moveTo(x + w - 5, y + 2);
            ctx.lineTo(x + w - 1, y - 4);
            ctx.stroke();
        }
        ctx.shadowBlur = 0;
    }

    // --- Mergulhadores ---
    for (const d of divers) {
        if (!d.alive) continue;
        ctx.shadowColor = d.color;
        ctx.shadowBlur = 20;
        ctx.fillStyle = d.color;
        ctx.beginPath();
        ctx.arc(d.x, d.y, 14, 0, Math.PI * 2);
        ctx.fill();
        // Asas
        ctx.fillRect(d.x - 18, d.y - 4, 8, 8);
        ctx.fillRect(d.x + 10, d.y - 4, 8, 8);
        ctx.shadowBlur = 0;
        // Olhos
        ctx.fillStyle = '#0b0b16';
        ctx.fillRect(d.x - 6, d.y - 4, 4, 5);
        ctx.fillRect(d.x + 2, d.y - 4, 4, 5);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(d.x - 7, d.y - 4, 2, 2);
        ctx.fillRect(d.x + 1, d.y - 4, 2, 2);
    }

    // --- Jogador ---
    ctx.shadowColor = '#6c6cff';
    ctx.shadowBlur = 25;
    ctx.fillStyle = '#6c6cff';
    ctx.beginPath();
    ctx.moveTo(player.x + PLAYER_W/2, player.y);
    ctx.lineTo(player.x + PLAYER_W, player.y + PLAYER_H);
    ctx.lineTo(player.x, player.y + PLAYER_H);
    ctx.closePath();
    ctx.fill();
    // Canhão
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#4a4a8a';
    ctx.fillRect(player.x + PLAYER_W/2 - 3, player.y - 6, 6, 8);
    // Detalhe
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(player.x + PLAYER_W/2, player.y + 6);
    ctx.lineTo(player.x + PLAYER_W/2 + 8, player.y + 16);
    ctx.lineTo(player.x + PLAYER_W/2 - 8, player.y + 16);
    ctx.closePath();
    ctx.fill();

    // --- Tiros do jogador ---
    ctx.shadowColor = '#6c6cff';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#6c6cff';
    for (const b of bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
        // Rastro
        ctx.fillStyle = 'rgba(108,108,255,0.2)';
        ctx.fillRect(b.x + 1, b.y + b.h, 4, 6);
        ctx.fillStyle = '#6c6cff';
    }

    // --- Tiros inimigos ---
    ctx.shadowColor = '#ff6b6b';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff6b6b';
    for (const b of enemyBullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    // --- Partículas ---
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;

    // --- Game Over ---
    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 48px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const msg = lives <= 0 ? '💀 GAME OVER' : '🏆 VOCÊ VENCEU!';
        ctx.fillText(msg, W/2, H/2 - 20);
        ctx.fillStyle = '#a0a0c0';
        ctx.font = '20px sans-serif';
        ctx.fillText('Clique em "Reiniciar"', W/2, H/2 + 50);
    }

    // --- Pausa ---
    if (paused && !gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 44px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⏸ PAUSADO', W/2, H/2);
    }
}

// ============================================================
//  LOOP
// ============================================================
function gameLoop() {
    update();
    draw();
    animationId = requestAnimationFrame(gameLoop);
}

// ============================================================
//  EVENTOS
// ============================================================
// --- Mouse ---
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W/2));
});

canvas.addEventListener('click', () => {
    if (!gameOver && !paused) playerShoot();
});

// --- Toque ---
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const touch = e.touches[0];
    const x = (touch.clientX - rect.left) * scaleX;
    targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W/2));
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const touch = e.touches[0];
    const x = (touch.clientX - rect.left) * scaleX;
    targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W/2));
    if (!gameOver && !paused) playerShoot();
}, { passive: false });

// --- Teclado ---
const keys = {};
document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (['ArrowLeft', 'ArrowRight', ' ', 'Space', 'p', 'P'].includes(key)) e.preventDefault();
    keys[key] = true;
    if (key === 'ArrowLeft') targetX = Math.max(0, player.x - 8);
    if (key === 'ArrowRight') targetX = Math.min(W - PLAYER_W, player.x + 8);
    if (key === ' ' || key === 'Space') playerShoot();
    if (key === 'p' || key === 'P') togglePause();
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// Movimento contínuo
setInterval(() => {
    if (keys['ArrowLeft']) targetX = Math.max(0, player.x - 8);
    if (keys['ArrowRight']) targetX = Math.min(W - PLAYER_W, player.x + 8);
}, 16);

// --- Botões mobile ---
document.querySelectorAll('[data-dir]').forEach(btn => {
    btn.addEventListener('click', () => {
        const dir = btn.dataset.dir;
        if (dir === 'left') targetX = Math.max(0, player.x - 20);
        else if (dir === 'right') targetX = Math.min(W - PLAYER_W, player.x + 20);
        else if (dir === 'shoot') playerShoot();
    });
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const dir = btn.dataset.dir;
        if (dir === 'left') targetX = Math.max(0, player.x - 20);
        else if (dir === 'right') targetX = Math.min(W - PLAYER_W, player.x + 20);
        else if (dir === 'shoot') playerShoot();
    });
});

// --- Botões principais ---
function togglePause() {
    if (gameOver) return;
    paused = !paused;
    pauseBtn.textContent = paused ? '▶️ Retomar' : '⏸️ Pausar';
    draw();
}

restartBtn.addEventListener('click', resetGame);
pauseBtn.addEventListener('click', togglePause);

// ============================================================
//  POLYFILL E INICIALIZAÇÃO
// ============================================================
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (r > w/2) r = w/2;
        if (r > h/2) r = h/2;
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        return this;
    };
}

createStars();
buildEnemies();
updateUI();
draw();
gameLoop();
</script>
</body>
