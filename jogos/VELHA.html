<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .status {
            color: #a0a0c0;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 30px;
            transition: 0.3s;
        }

        .status.winner {
            color: #ffd700;
            font-weight: bold;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 12px;
            background: transparent;
        }

        .cell {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            border-color: #6c6cff;
        }

        .cell.taken {
            cursor: not-allowed;
        }

        .cell.X {
            color: #6c6cff;
            text-shadow: 0 0 20px rgba(108, 108, 255, 0.4);
        }

        .cell.O {
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.4);
        }

        .cell.win-cell {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .restart-btn {
            margin-top: 30px;
            padding: 14px 45px;
            background: linear-gradient(135deg, #6c6cff, #5a5adf);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(108, 108, 255, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(108, 108, 255, 0.5);
            background: linear-gradient(135deg, #7a7aff, #6c6cff);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
                gap: 8px;
            }
            .cell {
                font-size: 2.8rem;
            }
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ JOGO DA VELHA</h1>
        <div class="status" id="status">Vez do Jogador <strong>X</strong></div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button class="restart-btn" id="restartBtn">🔄 NOVO JOGO</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');
        const restartBtn = document.getElementById('restartBtn');

        let currentPlayer = 'X';
        let gameActive = true;
        let gameState = ['', '', '', '', '', '', '', '', ''];
        let winCells = [];

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // linhas
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // colunas
            [0, 4, 8], [2, 4, 6]             // diagonais
        ];

        function handleCellClick(event) {
            const cell = event.target;
            const index = parseInt(cell.dataset.index);

            if (gameState[index] !== '' || !gameActive) {
                return;
            }

            gameState[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add('taken', currentPlayer);

            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            let winningCombination = [];

            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (gameState[a] === '' || gameState[b] === '' || gameState[c] === '') continue;

                if (gameState[a] === gameState[b] && gameState[b] === gameState[c]) {
                    roundWon = true;
                    winningCombination = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                status.textContent = `🎉 Jogador ${currentPlayer} VENCEU! 🎉`;
                status.classList.add('winner');
                gameActive = false;

                // Marca as células vencedoras
                winningCombination.forEach(index => {
                    cells[index].classList.add('win-cell');
                });
                return;
            }

            if (!gameState.includes('')) {
                status.textContent = '🤝 EMPATE! Ninguém ganhou.';
                status.classList.remove('winner');
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            status.innerHTML = `Vez do Jogador <strong>${currentPlayer}</strong>`;
            status.classList.remove('winner');
        }

        function restartGame() {
            currentPlayer = 'X';
            gameActive = true;
            gameState = ['', '', '', '', '', '', '', '', ''];
            winCells = [];

            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('taken', 'X', 'O', 'win-cell');
            });

            status.innerHTML = `Vez do Jogador <strong>X</strong>`;
            status.classList.remove('winner');
        }

        cells.forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        restartBtn.addEventListener('click', restartGame);
    </script>

</body>
</html>
