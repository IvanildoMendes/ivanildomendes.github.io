<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 Sudoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a4a;
            max-width: 100%;
        }

        h1 {
            color: #fff;
            text-align: center;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            gap: 20px;
            color: #a0a0c0;
            font-size: 0.95rem;
        }

        .stats span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
            font-weight: bold;
            color: #fff;
        }

        .difficulty {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .difficulty button {
            background: #2a2a4a;
            color: #a0a0c0;
            border: none;
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .difficulty button.active {
            background: #4a4a8a;
            color: #fff;
            border-color: #6c6cff;
            box-shadow: 0 0 20px rgba(108, 108, 255, 0.2);
        }

        .difficulty button:hover:not(.active) {
            background: #3a3a5a;
            color: #fff;
        }

        .board-wrapper {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            background: #0f0f1a;
            padding: 4px;
            border-radius: 12px;
            border: 3px solid #4a4a8a;
            max-width: 100%;
            width: fit-content;
        }

        .cell {
            width: 44px;
            height: 44px;
            background: #1e1e36;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #e0e0ff;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid transparent;
        }

        /* Bordas grossas a cada 3 células */
        .cell:nth-child(3n) {
            border-right: 2px solid #4a4a8a;
        }
        .cell:nth-child(9n) {
            border-right: none;
        }
        .cell:nth-child(n+19):nth-child(-n+27) {
            border-bottom: 2px solid #4a4a8a;
        }
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #4a4a8a;
        }

        .cell.given {
            color: #ffffff;
            font-weight: 700;
            background: #25254a;
            cursor: default;
        }

        .cell.editable {
            background: #1a1a30;
            color: #6c6cff;
        }

        .cell.editable:hover {
            background: #2a2a50;
        }

        .cell.selected {
            background: #3a3a7a !important;
            box-shadow: 0 0 15px rgba(108, 108, 255, 0.3);
            border-color: #6c6cff;
        }

        .cell.highlighted {
            background: #2a2a5a;
        }

        .cell.error {
            color: #ff4d4d !important;
            background: #3a1a1a !important;
        }

        .cell.hint-given {
            color: #ffd700 !important;
            background: #3a3a1a !important;
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
        }

        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
        }

        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(74, 74, 138, 0.3);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .numpad {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .numpad button {
            width: 42px;
            height: 42px;
            background: #1e1e36;
            color: #e0e0ff;
            border: 1px solid #2a2a4a;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .numpad button:hover {
            background: #3a3a6a;
            transform: scale(1.05);
        }

        .numpad button.erase {
            background: #3a1a1a;
            color: #ff6b6b;
            font-size: 0.8rem;
            width: 60px;
            border-radius: 30px;
        }

        .message {
            text-align: center;
            color: #a0a0c0;
            margin-top: 12px;
            font-size: 0.9rem;
            min-height: 24px;
        }

        .message.success {
            color: #4caf50;
            font-weight: bold;
        }
        .message.error-msg {
            color: #ff6b6b;
        }

        /* Responsivo */
        @media (max-width: 550px) {
            .container { padding: 15px; }
            .cell { width: 34px; height: 34px; font-size: 1rem; }
            #board { gap: 1.5px; padding: 3px; }
            .numpad button { width: 34px; height: 34px; font-size: 1rem; }
            .numpad button.erase { width: 50px; }
            .stats { font-size: 0.8rem; }
        }

        @media (max-width: 400px) {
            .cell { width: 28px; height: 28px; font-size: 0.8rem; }
            .numpad button { width: 28px; height: 28px; font-size: 0.8rem; }
            .numpad button.erase { width: 40px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧩 SUDOKU</h1>

        <div class="top-bar">
            <div class="stats">
                <span>⏱️ <span id="timerDisplay">0</span>s</span>
                <span>❌ <span id="errorCount">0</span></span>
            </div>
            <div class="difficulty">
                <button data-level="easy" class="active">Fácil</button>
                <button data-level="medium">Médio</button>
                <button data-level="hard">Difícil</button>
                <button data-level="insane">Insano</button>
            </div>
        </div>

        <div class="board-wrapper">
            <div id="board"></div>
        </div>

        <div class="numpad" id="numpad">
            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>
            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>
            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>
            <button class="erase" data-num="0">⌫</button>
        </div>

        <div class="controls">
            <button id="newGameBtn">🔄 Nova Partida</button>
            <button id="hintBtn">💡 Dica</button>
            <button id="checkBtn">✅ Verificar</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        // ============================================================
        //  1.  CONSTANTES E ESTADO
        // ============================================================
        const DIFFICULTY = {
            easy: { remove: 30, label: 'Fácil' },
            medium: { remove: 45, label: 'Médio' },
            hard: { remove: 55, label: 'Difícil' },
            insane: { remove: 62, label: 'Insano' }
        };

        let currentLevel = 'easy';
        let board = [];             // 9x9 de números (0 = vazio)
        let solution = [];          // 9x9 da solução completa
        let given = [];            // 9x9 boolean (true = fixo, false = editável)
        let selectedRow = -1, selectedCol = -1;
        let errorCount = 0;
        let timer = 0;
        let timerInterval = null;
        let gameOver = false;

        const boardEl = document.getElementById('board');
        const timerDisplay = document.getElementById('timerDisplay');
        const errorDisplay = document.getElementById('errorCount');
        const messageEl = document.getElementById('message');

        // ============================================================
        //  2.  GERADOR DE SUDOKU (com solução única)
        // ============================================================

        // --- Gera um tabuleiro resolvido usando permutação ---
        function generateSolvedBoard() {
            // Base: tabuleiro resolvido clássico
            let base = [
                [1, 2, 3, 4, 5, 6, 7, 8, 9],
                [4, 5, 6, 7, 8, 9, 1, 2, 3],
                [7, 8, 9, 1, 2, 3, 4, 5, 6],
                [2, 3, 4, 5, 6, 7, 8, 9, 1],
                [5, 6, 7, 8, 9, 1, 2, 3, 4],
                [8, 9, 1, 2, 3, 4, 5, 6, 7],
                [3, 4, 5, 6, 7, 8, 9, 1, 2],
                [6, 7, 8, 9, 1, 2, 3, 4, 5],
                [9, 1, 2, 3, 4, 5, 6, 7, 8]
            ];

            // 1. Embaralha os números (1-9)
            const nums = shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9]);
            const map = {};
            for (let i = 0; i < 9; i++) map[i + 1] = nums[i];
            for (let r = 0; r < 9; r++)
                for (let c = 0; c < 9; c++)
                    base[r][c] = map[base[r][c]];

            // 2. Embaralha linhas dentro de cada bloco de 3
            for (let block = 0; block < 3; block++) {
                const rows = [block * 3, block * 3 + 1, block * 3 + 2];
                shuffle(rows);
                const newRows = rows.map(i => base[i]);
                for (let i = 0; i < 3; i++) base[block * 3 + i] = newRows[i];
            }

            // 3. Embaralha colunas dentro de cada bloco de 3
            for (let block = 0; block < 3; block++) {
                const cols = [block * 3, block * 3 + 1, block * 3 + 2];
                shuffle(cols);
                for (let r = 0; r < 9; r++) {
                    const newRow = cols.map(c => base[r][c]);
                    for (let i = 0; i < 3; i++) base[r][block * 3 + i] = newRow[i];
                }
            }

            // 4. Embaralha blocos de linhas (troca os 3 grupos de 3 linhas)
            const blockRows = shuffle([0, 1, 2]);
            const tempRows = [];
            for (let i = 0; i < 3; i++) {
                const br = blockRows[i];
                for (let r = 0; r < 3; r++) tempRows.push(base[br * 3 + r]);
            }
            for (let r = 0; r < 9; r++) base[r] = tempRows[r];

            // 5. Embaralha blocos de colunas
            const blockCols = shuffle([0, 1, 2]);
            const tempCols = [];
            for (let r = 0; r < 9; r++) {
                const row = [];
                for (let i = 0; i < 3; i++) {
                    const bc = blockCols[i];
                    for (let c = 0; c < 3; c++) row.push(base[r][bc * 3 + c]);
                }
                tempCols.push(row);
            }
            for (let r = 0; r < 9; r++) base[r] = tempCols[r];

            return base;
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- Verifica se um número pode ser colocado na posição (r,c) ---
        function isValid(board, r, c, num) {
            for (let i = 0; i < 9; i++) {
                if (board[r][i] === num) return false;
                if (board[i][c] === num) return false;
            }
            const br = Math.floor(r / 3) * 3;
            const bc = Math.floor(c / 3) * 3;
            for (let i = 0; i < 3; i++)
                for (let j = 0; j < 3; j++)
                    if (board[br + i][bc + j] === num) return false;
            return true;
        }

        // --- Resolve um tabuleiro (backtracking) e retorna true se tiver solução ---
        function solveSudoku(board) {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) {
                        for (let num = 1; num <= 9; num++) {
                            if (isValid(board, r, c, num)) {
                                board[r][c] = num;
                                if (solveSudoku(board)) return true;
                                board[r][c] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        // --- Conta quantas soluções tem (limita a 2 para performance) ---
        function countSolutions(board, limit = 2) {
            let count = 0;
            function backtrack(b) {
                if (count >= limit) return;
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (b[r][c] === 0) {
                            for (let num = 1; num <= 9; num++) {
                                if (isValid(b, r, c, num)) {
                                    b[r][c] = num;
                                    backtrack(b);
                                    b[r][c] = 0;
                                    if (count >= limit) return;
                                }
                            }
                            return;
                        }
                    }
                }
                count++;
            }
            const copy = board.map(row => [...row]);
            backtrack(copy);
            return count;
        }

        // --- Gera um puzzle removendo células, garantindo solução única ---
        function generatePuzzle(removeCount) {
            const solved = generateSolvedBoard();
            const puzzle = solved.map(row => [...row]);
            const positions = [];
            for (let r = 0; r < 9; r++)
                for (let c = 0; c < 9; c++)
                    positions.push([r, c]);
            shuffle(positions);

            let removed = 0;
            for (const [r, c] of positions) {
                if (removed >= removeCount) break;
                const backup = puzzle[r][c];
                puzzle[r][c] = 0;
                // Verifica se ainda tem solução única
                const count = countSolutions(puzzle, 2);
                if (count === 1) {
                    removed++;
                } else {
                    puzzle[r][c] = backup;
                }
            }

            return { puzzle, solution: solved };
        }

        // ============================================================
        //  3.  INTERFACE E LÓGICA DO JOGO
        // ============================================================

        function startGame(level) {
            currentLevel = level;
            const removeCount = DIFFICULTY[level].remove;
            const data = generatePuzzle(removeCount);
            board = data.puzzle;
            solution = data.solution;

            given = board.map(row => row.map(v => v !== 0));
            errorCount = 0;
            gameOver = false;
            selectedRow = -1;
            selectedCol = -1;

            if (timerInterval) clearInterval(timerInterval);
            timer = 0;
            timerDisplay.textContent = '0';
            timerInterval = setInterval(() => {
                timer++;
                timerDisplay.textContent = timer;
            }, 1000);

            errorDisplay.textContent = '0';
            messageEl.textContent = '';
            messageEl.className = 'message';

            renderBoard();
            updateDifficultyButtons(level);
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const value = board[r][c];
                    if (value !== 0) {
                        cell.textContent = value;
                    }

                    if (given[r][c]) {
                        cell.classList.add('given');
                    } else {
                        cell.classList.add('editable');
                        cell.addEventListener('click', () => selectCell(r, c));
                    }

                    // Destaque de erro (se houver)
                    if (!given[r][c] && value !== 0 && value !== solution[r][c]) {
                        cell.classList.add('error');
                    }

                    // Selecionado
                    if (selectedRow === r && selectedCol === c) {
                        cell.classList.add('selected');
                    }

                    // Highlight da mesma linha/coluna/bloco
                    if (selectedRow !== -1 && selectedCol !== -1) {
                        const sr = selectedRow, sc = selectedCol;
                        if (r === sr || c === sc ||
                            (Math.floor(r / 3) === Math.floor(sr / 3) &&
                                Math.floor(c / 3) === Math.floor(sc / 3))) {
                            if (!(r === sr && c === sc))
                                cell.classList.add('highlighted');
                        }
                    }

                    boardEl.appendChild(cell);
                }
            }
        }

        function selectCell(row, col) {
            if (gameOver) return;
            if (given[row][col]) {
                // Se clicou num fixo, apenas seleciona para referência
                selectedRow = row;
                selectedCol = col;
                renderBoard();
                return;
            }
            selectedRow = row;
            selectedCol = col;
            renderBoard();
        }

        function updateDifficultyButtons(level) {
            document.querySelectorAll('.difficulty button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.level === level);
            });
        }

        // ============================================================
        //  4.  AÇÕES DO JOGADOR (inserir número, dica, verificar)
        // ============================================================

        function insertNumber(num) {
            if (gameOver) return;
            if (selectedRow === -1 || selectedCol === -1) {
                messageEl.textContent = '👆 Selecione uma célula primeiro!';
                messageEl.className = 'message error-msg';
                return;
            }
            const r = selectedRow, c = selectedCol;
            if (given[r][c]) {
                messageEl.textContent = '🔒 Essa célula é fixa!';
                messageEl.className = 'message error-msg';
                return;
            }

            if (num === 0) {
                // Apagar
                board[r][c] = 0;
                renderBoard();
                messageEl.textContent = '';
                messageEl.className = 'message';
                return;
            }

            // Verifica se o número é válido (não repete)
            const tempBoard = board.map(row => [...row]);
            tempBoard[r][c] = num;
            if (!isValid(tempBoard, r, c, num)) {
                messageEl.textContent = `❌ O número ${num} não pode ficar aqui!`;
                messageEl.className = 'message error-msg';
                // Marca erro
                errorCount++;
                errorDisplay.textContent = errorCount;
                // Mostra vermelho
                board[r][c] = num;
                renderBoard();
                // Reverte depois de um tempo? Vou manter o número vermelho para indicar erro.
                // Mas o jogador pode apagar depois.
                return;
            }

            // Número válido
            board[r][c] = num;
            // Verifica se está correto (igual à solução)
            if (num !== solution[r][c]) {
                errorCount++;
                errorDisplay.textContent = errorCount;
                renderBoard(); // mostra erro
                messageEl.textContent = '⚠️ Número incorreto!';
                messageEl.className = 'message error-msg';
            } else {
                renderBoard();
                messageEl.textContent = '✅ Correto!';
                messageEl.className = 'message success';
            }

            // Verifica vitória
            checkVictory();
        }

        function giveHint() {
            if (gameOver) return;
            // Encontra a primeira célula vazia (ou errada) e preenche com a solução
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (!given[r][c] && board[r][c] !== solution[r][c]) {
                        board[r][c] = solution[r][c];
                        given[r][c] = true; // torna fixa
                        renderBoard();
                        // Destaca a célula
                        const cells = boardEl.querySelectorAll('.cell');
                        const idx = r * 9 + c;
                        cells[idx].classList.add('hint-given');
                        messageEl.textContent = `💡 Dica na linha ${r+1}, coluna ${c+1}`;
                        messageEl.className = 'message success';
                        checkVictory();
                        return;
                    }
                }
            }
            messageEl.textContent = '🎉 Não há células para dica!';
            messageEl.className = 'message success';
        }

        function checkVictory() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] !== solution[r][c]) return false;
                }
            }
            // Venceu!
            gameOver = true;
            clearInterval(timerInterval);
            messageEl.textContent = `🏆 PARABÉNS! Você completou em ${timer} segundos! 🏆`;
            messageEl.className = 'message success';
            renderBoard();
            return true;
        }

        function checkBoard() {
            if (gameOver) return;
            let hasError = false;
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (!given[r][c] && board[r][c] !== 0 && board[r][c] !== solution[r][c]) {
                        hasError = true;
                        // Marca erro visual
                        const cells = boardEl.querySelectorAll('.cell');
                        const idx = r * 9 + c;
                        cells[idx].classList.add('error');
                    }
                }
            }
            if (hasError) {
                messageEl.textContent = '❌ Existem números incorretos! (marcados em vermelho)';
                messageEl.className = 'message error-msg';
            } else {
                // Verifica se está completo
                let complete = true;
                for (let r = 0; r < 9; r++)
                    for (let c = 0; c < 9; c++)
                        if (board[r][c] === 0) complete = false;
                if (complete) {
                    checkVictory();
                } else {
                    messageEl.textContent = '✅ Todos os números preenchidos estão corretos!';
                    messageEl.className = 'message success';
                }
            }
        }

        // ============================================================
        //  5.  EVENTOS
        // ============================================================

        // Numpad
        document.querySelectorAll('.numpad button').forEach(btn => {
            btn.addEventListener('click', () => {
                const num = parseInt(btn.dataset.num);
                insertNumber(num);
            });
        });

        // Teclado físico
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '9') {
                insertNumber(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
                insertNumber(0);
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                if (selectedRow === -1 || selectedCol === -1) {
                    selectedRow = 4;
                    selectedCol = 4;
                } else {
                    if (e.key === 'ArrowUp') selectedRow = Math.max(0, selectedRow - 1);
                    if (e.key === 'ArrowDown') selectedRow = Math.min(8, selectedRow + 1);
                    if (e.key === 'ArrowLeft') selectedCol = Math.max(0, selectedCol - 1);
                    if (e.key === 'ArrowRight') selectedCol = Math.min(8, selectedCol + 1);
                }
                renderBoard();
            }
        });

        // Botões
        document.getElementById('newGameBtn').addEventListener('click', () => {
            startGame(currentLevel);
        });

        document.getElementById('hintBtn').addEventListener('click', giveHint);

        document.getElementById('checkBtn').addEventListener('click', checkBoard);

        document.querySelectorAll('.difficulty button').forEach(btn => {
            btn.addEventListener('click', () => {
                const level = btn.dataset.level;
                currentLevel = level;
                startGame(level);
            });
        });

        // ============================================================
        //  6.  INICIAR
        // ============================================================
        startGame('easy');
    </script>

</body>
</html>
