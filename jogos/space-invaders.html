<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👾 Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: #0b0b16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #1a1a2e;
            padding: 25px 30px 30px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a4a;
            text-align: center;
            max-width: 100%;
        }

        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0c0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .info-bar span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }

        .info-bar .lives {
            color: #ff6b6b;
        }
        .info-bar .score {
            color: #ffd700;
        }
        .info-bar .level {
            color: #6c6cff;
        }

        #gameCanvas {
            background: #0b0b16;
            border-radius: 16px;
            border: 3px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 800 / 500;
            image-rendering: pixelated;
            touch-action: none;
            cursor: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 18px;
        }

        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }

        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(108, 108, 255, 0.15);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
            line-height: 1.6;
        }

        .hint kbd {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            color: #c0c0e0;
            font-weight: 600;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .info-bar { font-size: 0.9rem; }
            .controls button { padding: 8px 18px; font-size: 0.8rem; }
            .hint { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👾 SPACE INVADERS</h1>

        <div class="info-bar">
            <span class="score">🏆 <span id="scoreDisplay">0</span></span>
            <span class="level">⚡ Nível <span id="levelDisplay">1</span></span>
            <span class="lives">❤️ <span id="livesDisplay">3</span></span>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div class="controls">
            <button id="restartBtn">🔄 Reiniciar</button>
            <button id="pauseBtn">⏸️ Pausar</button>
            <button id="shootBtn">🔫 Atirar</button>
        </div>

        <div class="hint">
            <kbd>←</kbd> <kbd>→</kbd> mover &nbsp;·&nbsp; <kbd>Espaço</kbd> atirar &nbsp;·&nbsp; <kbd>P</kbd> pausa
        </div>
    </div>

    <script>
        // ================================================================
        //  1.  CONFIGURAÇÕES E ELEMENTOS
        // ================================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const levelSpan = document.getElementById('levelDisplay');
        const livesSpan = document.getElementById('livesDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const shootBtn = document.getElementById('shootBtn');

        const W = 800,
            H = 500;
        const PLAYER_W = 40;
        const PLAYER_H = 28;
        const PLAYER_Y = H - 50;
        const PLAYER_SPEED = 6;

        const INVADER_ROWS = 5;
        const INVADER_COLS = 11;
        const INVADER_W = 34;
        const INVADER_H = 28;
        const INVADER_GAP = 6;
        const INVADER_OFFSET_Y = 50;

        const BULLET_W = 4;
        const BULLET_H = 12;
        const BULLET_SPEED = 7;
        const ENEMY_BULLET_SPEED = 3.5;

        // Cores dos invasores por linha (de cima para baixo)
        const INVADER_COLORS = ['#ff6b6b', '#ffa94d', '#ffd93d', '#6bcb77', '#4d96ff'];

        // ================================================================
        //  2.  ESTADO DO JOGO
        // ================================================================
        let player = { x: W / 2 - PLAYER_W / 2, y: PLAYER_Y };
        let invaders = [];
        let bullets = [];
        let enemyBullets = [];
        let explosions = [];
        let stars = [];

        let score = 0;
        let lives = 3;
        let level = 1;
        let gameOver = false;
        let paused = false;
        let animationId = null;
        let shootCooldown = 0;
        const SHOOT_DELAY = 12; // frames

        // Movimento dos invasores
        let invaderDirection = 1;
        let invaderSpeed = 0.8;
        let invaderMoveCounter = 0;
        let invaderMoveInterval = 30; // frames entre movimentos
        let invaderShootTimer = 0;
        const INVADER_SHOOT_DELAY = 60;

        // Controle do jogador (mouse/teclado)
        let targetX = player.x;

        // ================================================================
        //  3.  FUNÇÕES AUXILIARES
        // ================================================================

        function createStars() {
            stars = [];
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: 1 + Math.random() * 2,
                    speed: 0.3 + Math.random() * 0.6,
                    brightness: 0.3 + Math.random() * 0.7
                });
            }
        }

        function buildInvaders() {
            invaders = [];
            const totalWidth = INVADER_COLS * (INVADER_W + INVADER_GAP) - INVADER_GAP;
            const offsetX = (W - totalWidth) / 2;

            for (let r = 0; r < INVADER_ROWS; r++) {
                for (let c = 0; c < INVADER_COLS; c++) {
                    invaders.push({
                        x: offsetX + c * (INVADER_W + INVADER_GAP),
                        y: INVADER_OFFSET_Y + r * (INVADER_H + INVADER_GAP),
                        w: INVADER_W,
                        h: INVADER_H,
                        color: INVADER_COLORS[r % INVADER_COLORS.length],
                        row: r,
                        alive: true,
                        // Padrão de animação (pisca)
                        frame: Math.floor(Math.random() * 2)
                    });
                }
            }
            // Reseta a velocidade e direção
            invaderDirection = 1;
            invaderSpeed = 0.8 + (level - 1) * 0.15;
            invaderMoveInterval = Math.max(12, 30 - (level - 1) * 2);
            invaderMoveCounter = 0;
        }

        function resetGame() {
            player.x = W / 2 - PLAYER_W / 2;
            targetX = player.x;
            bullets = [];
            enemyBullets = [];
            explosions = [];
            score = 0;
            lives = 3;
            level = 1;
            gameOver = false;
            paused = false;
            pauseBtn.textContent = '⏸️ Pausar';
            shootCooldown = 0;
            invaderShootTimer = 0;
            buildInvaders();
            updateUI();
            draw();
        }

        function updateUI() {
            scoreSpan.textContent = score;
            levelSpan.textContent = level;
            livesSpan.textContent = lives;
        }

        function spawnExplosion(x, y, color, count = 20) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * 2 * Math.PI;
                const speed = 1.5 + Math.random() * 4;
                explosions.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.5,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.025,
                    size: 2 + Math.random() * 4,
                    color: color
                });
            }
        }

        // ================================================================
        //  4.  LÓGICA DE TIROS
        // ================================================================

        function playerShoot() {
            if (gameOver || paused) return;
            if (shootCooldown > 0) return;
            bullets.push({
                x: player.x + PLAYER_W / 2 - BULLET_W / 2,
                y: player.y - BULLET_H,
                w: BULLET_W,
                h: BULLET_H,
                speed: BULLET_SPEED
            });
            shootCooldown = SHOOT_DELAY;
        }

        function enemyShoot() {
            // Escolhe um invasor aleatório vivo
            const alive = invaders.filter(i => i.alive);
            if (alive.length === 0) return;
            const shooter = alive[Math.floor(Math.random() * alive.length)];
            enemyBullets.push({
                x: shooter.x + INVADER_W / 2 - 3,
                y: shooter.y + INVADER_H,
                w: 6,
                h: 10,
                speed: ENEMY_BULLET_SPEED + (level - 1) * 0.3
            });
        }

        // ================================================================
        //  5.  ATUALIZAÇÃO DO JOGO
        // ================================================================

        function update() {
            if (paused || gameOver) return;

            // --- Atualiza estrelas ---
            for (const star of stars) {
                star.y += star.speed;
                if (star.y > H) {
                    star.y = 0;
                    star.x = Math.random() * W;
                }
            }

            // --- Movimento do jogador ---
            player.x += (targetX - player.x) * 0.2;
            player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));

            // --- Cooldown de tiro ---
            if (shootCooldown > 0) shootCooldown--;

            // --- Movimento dos invasores ---
            invaderMoveCounter++;
            if (invaderMoveCounter >= invaderMoveInterval) {
                invaderMoveCounter = 0;
                let shouldReverse = false;
                // Verifica se algum invasor chegou na borda
                for (const inv of invaders) {
                    if (!inv.alive) continue;
                    if (invaderDirection === 1 && inv.x + inv.w >= W - 5) shouldReverse = true;
                    if (invaderDirection === -1 && inv.x <= 5) shouldReverse = true;
                    // Verifica se chegou perto do jogador (game over)
                    if (inv.y + inv.h >= player.y - 10) {
                        gameOver = true;
                        return;
                    }
                }

                if (shouldReverse) {
                    invaderDirection *= -1;
                    // Desce todos os invasores
                    for (const inv of invaders) {
                        if (inv.alive) inv.y += 8;
                    }
                } else {
                    // Move os invasores horizontalmente
                    for (const inv of invaders) {
                        if (inv.alive) inv.x += invaderDirection * invaderSpeed;
                    }
                }
                // Alterna o frame de animação
                for (const inv of invaders) {
                    if (inv.alive) inv.frame = 1 - inv.frame;
                }
            }

            // --- Invasores atiram (aleatório) ---
            invaderShootTimer++;
            if (invaderShootTimer >= INVADER_SHOOT_DELAY) {
                invaderShootTimer = 0;
                // Chance baseada no nível e na quantidade de invasores vivos
                const alive = invaders.filter(i => i.alive).length;
                if (alive > 0 && Math.random() < 0.02 + level * 0.005) {
                    enemyShoot();
                }
            }

            // --- Atualiza tiros do jogador ---
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y -= b.speed;
                if (b.y + b.h < 0) {
                    bullets.splice(i, 1);
                    continue;
                }
                // Colisão com invasores
                let hit = false;
                for (const inv of invaders) {
                    if (!inv.alive) continue;
                    if (b.x < inv.x + inv.w && b.x + b.w > inv.x &&
                        b.y < inv.y + inv.h && b.y + b.h > inv.y) {
                        inv.alive = false;
                        hit = true;
                        score += (INVADER_ROWS - inv.row) * 10 + 5;
                        updateUI();
                        spawnExplosion(inv.x + inv.w / 2, inv.y + inv.h / 2, inv.color, 20);
                        // Verifica se todos foram mortos
                        const remaining = invaders.filter(i => i.alive).length;
                        if (remaining === 0) {
                            // Próximo nível
                            level++;
                            invaderSpeed = 0.8 + (level - 1) * 0.15;
                            invaderMoveInterval = Math.max(10, 30 - (level - 1) * 2);
                            buildInvaders();
                            updateUI();
                            // Limpa tiros inimigos
                            enemyBullets = [];
                        }
                        break;
                    }
                }
                if (hit) {
                    bullets.splice(i, 1);
                }
            }

            // --- Atualiza tiros inimigos ---
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                b.y += b.speed;
                if (b.y > H) {
                    enemyBullets.splice(i, 1);
                    continue;
                }
                // Colisão com o jogador
                if (b.x < player.x + PLAYER_W && b.x + b.w > player.x &&
                    b.y < player.y + PLAYER_H && b.y + b.h > player.y) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    updateUI();
                    spawnExplosion(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2, '#ff6b6b', 30);
                    if (lives <= 0) {
                        gameOver = true;
                        return;
                    }
                    // Reseta a posição do jogador (não precisa, mas dá um respawn)
                    // Pequeno efeito de invencibilidade (ignoramos por simplicidade)
                }
            }

            // --- Atualiza explosões ---
            for (let i = explosions.length - 1; i >= 0; i--) {
                const p = explosions[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= p.decay;
                if (p.life <= 0) {
                    explosions.splice(i, 1);
                }
            }

            // --- Se o jogador perdeu todas as vidas ---
            if (lives <= 0) {
                gameOver = true;
            }
        }

        // ================================================================
        //  6.  RENDERIZAÇÃO
        // ================================================================

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // --- Fundo estrelado ---
            for (const star of stars) {
                ctx.globalAlpha = star.brightness;
                ctx.fillStyle = '#fff';
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }
            ctx.globalAlpha = 1;

            // --- Invasores ---
            for (const inv of invaders) {
                if (!inv.alive) continue;
                // Sombra
                ctx.shadowColor = inv.color;
                ctx.shadowBlur = 12;
                ctx.fillStyle = inv.color;
                // Corpo do invasor (formato clássico)
                const x = inv.x,
                    y = inv.y,
                    w = inv.w,
                    h = inv.h;
                // Desenha um alienígena estilizado
                ctx.beginPath();
                // Corpo principal (retângulo arredondado)
                ctx.roundRect(x, y + 4, w, h - 8, 4);
                ctx.fill();
                // Cabeça (meio círculo)
                ctx.fillStyle = inv.color;
                ctx.beginPath();
                ctx.arc(x + w / 2, y + 6, 10, Math.PI, 0, false);
                ctx.fill();
                // Olhos (baseado no frame de animação)
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#0b0b16';
                const eyeOffset = inv.frame === 0 ? 0 : 2;
                ctx.fillRect(x + 8 + eyeOffset, y + 4, 4, 5);
                ctx.fillRect(x + w - 12 + eyeOffset, y + 4, 4, 5);
                // Brilho no olho
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(x + 7 + eyeOffset, y + 4, 2, 2);
                ctx.fillRect(x + w - 13 + eyeOffset, y + 4, 2, 2);

                // Antenas (se for da primeira linha)
                if (inv.row === 0) {
                    ctx.strokeStyle = inv.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x + 6, y + 2);
                    ctx.lineTo(x + 2, y - 4);
                    ctx.moveTo(x + w - 6, y + 2);
                    ctx.lineTo(x + w - 2, y - 4);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
            }

            // --- Jogador ---
            ctx.shadowColor = '#6c6cff';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#6c6cff';
            // Nave triangular
            ctx.beginPath();
            ctx.moveTo(player.x + PLAYER_W / 2, player.y);
            ctx.lineTo(player.x + PLAYER_W, player.y + PLAYER_H);
            ctx.lineTo(player.x, player.y + PLAYER_H);
            ctx.closePath();
            ctx.fill();
            // Detalhe da cabine
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.moveTo(player.x + PLAYER_W / 2, player.y + 6);
            ctx.lineTo(player.x + PLAYER_W / 2 + 8, player.y + 16);
            ctx.lineTo(player.x + PLAYER_W / 2 - 8, player.y + 16);
            ctx.closePath();
            ctx.fill();

            // Canhão
            ctx.fillStyle = '#4a4a8a';
            ctx.fillRect(player.x + PLAYER_W / 2 - 3, player.y - 6, 6, 8);

            // --- Tiros do jogador ---
            ctx.shadowColor = '#6c6cff';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#6c6cff';
            for (const b of bullets) {
                ctx.fillRect(b.x, b.y, b.w, b.h);
            }

            // --- Tiros inimigos ---
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ff6b6b';
            for (const b of enemyBullets) {
                ctx.fillRect(b.x, b.y, b.w, b.h);
                // Rastro
                ctx.fillStyle = 'rgba(255,107,107,0.3)';
                ctx.fillRect(b.x + 1, b.y + b.h, 4, 6);
                ctx.fillStyle = '#ff6b6b';
            }
            ctx.shadowBlur = 0;

            // --- Explosões ---
            for (const p of explosions) {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            // --- Game Over ---
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 48px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const msg = lives <= 0 ? '💀 GAME OVER' : '🏆 VOCÊ VENCEU!';
                ctx.fillText(msg, W / 2, H / 2 - 20);
                ctx.fillStyle = '#a0a0c0';
                ctx.font = '20px sans-serif';
                ctx.fillText('Clique em "Reiniciar" para jogar novamente', W / 2, H / 2 + 50);
            }

            // --- Pausa ---
            if (paused && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸ PAUSADO', W / 2, H / 2);
            }
        }

        // ================================================================
        //  7.  LOOP PRINCIPAL
        // ================================================================

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // ================================================================
        //  8.  EVENTOS
        // ================================================================

        // --- Mouse ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const x = (e.clientX - rect.left) * scaleX;
            targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W / 2));
        });

        canvas.addEventListener('click', () => {
            if (gameOver) return;
            playerShoot();
        });

        // --- Toque (celular) ---
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W / 2));
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver) return;
            // Move a nave para o toque
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * scaleX;
            targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W / 2));
            playerShoot();
        }, { passive: false });

        // --- Teclado ---
        const keys = {};
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
            }
            keys[e.key] = true;
            if (e.key === 'ArrowLeft') targetX = Math.max(0, player.x - PLAYER_SPEED);
            if (e.key === 'ArrowRight') targetX = Math.min(W - PLAYER_W, player.x + PLAYER_SPEED);
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                playerShoot();
            }
            if (e.key === 'p' || e.key === 'P') togglePause();
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Movimento contínuo com setas
        setInterval(() => {
            if (keys['ArrowLeft']) targetX = Math.max(0, player.x - PLAYER_SPEED);
            if (keys['ArrowRight']) targetX = Math.min(W - PLAYER_W, player.x + PLAYER_SPEED);
        }, 16);

        // --- Botões ---
        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            pauseBtn.textContent = paused ? '▶️ Retomar' : '⏸️ Pausar';
            draw();
        }

        function restartGame() {
            resetGame();
            // Recria as estrelas (já estão criadas)
            draw();
        }

        restartBtn.addEventListener('click', restartGame);
        pauseBtn.addEventListener('click', togglePause);
        shootBtn.addEventListener('click', playerShoot);

        // ================================================================
        //  9.  POLYFILL E INICIALIZAÇÃO
        // ================================================================

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }

        createStars();
        buildInvaders();
        updateUI();
        draw();
        gameLoop();
    </script>
