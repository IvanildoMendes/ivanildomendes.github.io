<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐛 Centipede</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0b0b16;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: #1a1a2e;
            padding: 25px 30px 30px;
            border-radius: 30px;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            max-width: 100%;
        }
        h1 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
            color: #a0a0c0;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .info-bar span {
            background: #0f0f1a;
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid #2a2a4a;
        }
        .info-bar .lives { color: #ff6b6b; }
        .info-bar .score { color: #ffd700; }
        .info-bar .level { color: #6c6cff; }

        #gameCanvas {
            background: #0b0b16;
            border-radius: 16px;
            border: 3px solid #2a2a4a;
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            height: auto;
            aspect-ratio: 600 / 600;
            touch-action: none;
            cursor: crosshair;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 18px;
        }
        .controls button {
            background: #2a2a4a;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid transparent;
        }
        .controls button:hover {
            background: #4a4a8a;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(108,108,255,0.15);
        }
        .controls button:active { transform: scale(0.95); }
        .hint {
            color: #606080;
            font-size: 0.85rem;
            margin-top: 12px;
        }
        .hint kbd {
            background: #1a1a2e;
            padding: 2px 10px;
            border-radius: 6px;
            border: 1px solid #2a2a4a;
            color: #c0c0e0;
            font-weight: 600;
        }
        /* Mobile */
        .mobile-controls {
            display: none;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
        }
        .mobile-controls button {
            background: #2a2a4a;
            border: 1px solid #3a3a5a;
            border-radius: 12px;
            color: #fff;
            font-size: 2rem;
            padding: 8px 16px;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 0 #0f0f1a;
            transition: 0.1s;
            min-width: 60px;
        }
        .mobile-controls button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f1a;
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .info-bar { font-size: 0.9rem; }
            .controls button { padding: 8px 18px; font-size: 0.8rem; }
            .hint { font-size: 0.75rem; }
            .mobile-controls { display: flex; }
        }
        @media (pointer: coarse) { .mobile-controls { display: flex; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🐛 CENTIPEDE</h1>
    <div class="info-bar">
        <span class="score">🏆 <span id="scoreDisplay">0</span></span>
        <span class="level">⚡ Nível <span id="levelDisplay">1</span></span>
        <span class="lives">❤️ <span id="livesDisplay">3</span></span>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div class="mobile-controls">
        <button id="moveLeft">◀</button>
        <button id="fireBtn">🔫</button>
        <button id="moveRight">▶</button>
    </div>

    <div class="controls">
        <button id="restartBtn">🔄 Reiniciar</button>
        <button id="pauseBtn">⏸️ Pausar</button>
    </div>
    <div class="hint">
        <kbd>←</kbd> <kbd>→</kbd> mover &nbsp;·&nbsp; <kbd>Espaço</kbd> atirar &nbsp;·&nbsp; <kbd>P</kbd> pausa
    </div>
</div>

<script>
    // ================================================================
    //  1.  CONFIGURAÇÕES
    // ================================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const levelSpan = document.getElementById('levelDisplay');
    const livesSpan = document.getElementById('livesDisplay');
    const restartBtn = document.getElementById('restartBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const moveLeftBtn = document.getElementById('moveLeft');
    const moveRightBtn = document.getElementById('moveRight');
    const fireBtn = document.getElementById('fireBtn');

    const W = 600, H = 600;
    const PLAYER_W = 30, PLAYER_H = 16;
    const PLAYER_Y = H - 40;
    const BULLET_W = 4, BULLET_H = 12;
    const BULLET_SPEED = 6;

    // Tamanho dos cogumelos
    const MUSHROOM_SIZE = 12;

    // ================================================================
    //  2.  ESTADO DO JOGO
    // ================================================================
    let player = { x: W/2 - PLAYER_W/2, y: PLAYER_Y };
    let bullets = [];
    let mushrooms = [];
    let centipede = [];
    let spiders = [];
    let fleas = [];
    let scorpions = [];
    let particles = [];
    let score = 0;
    let lives = 3;
    let level = 1;
    let gameOver = false;
    let paused = false;
    let animationId = null;
    let shootCooldown = 0;
    const SHOOT_DELAY = 8;

    // Controles
    let targetX = player.x;
    let keys = {};

    // ================================================================
    //  3.  FUNÇÕES AUXILIARES
    // ================================================================

    function initMushrooms() {
        mushrooms = [];
        // Cria uma grade de cogumelos na parte inferior (área de jogo)
        const cols = Math.floor(W / MUSHROOM_SIZE);
        const rows = Math.floor((H - 80) / MUSHROOM_SIZE);
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // Deixa uma área livre perto do player (centro inferior)
                const px = c * MUSHROOM_SIZE + MUSHROOM_SIZE/2;
                const py = r * MUSHROOM_SIZE + MUSHROOM_SIZE/2 + 40;
                if (py < H - 120 && px > 80 && px < W - 80) {
                    // Probabilidade de cogumelo (70%)
                    if (Math.random() < 0.7) {
                        mushrooms.push({
                            x: px,
                            y: py,
                            radius: MUSHROOM_SIZE/2 - 1,
                            alive: true,
                            poisoned: false
                        });
                    }
                }
            }
        }
        // Adiciona alguns cogumelos mais perto do topo para a centopeia inicial
        for (let i = 0; i < 10; i++) {
            const x = 30 + Math.random() * (W - 60);
            const y = 30 + Math.random() * 80;
            if (!mushrooms.some(m => Math.abs(m.x - x) < 15 && Math.abs(m.y - y) < 15)) {
                mushrooms.push({
                    x, y,
                    radius: MUSHROOM_SIZE/2 - 1,
                    alive: true,
                    poisoned: false
                });
            }
        }
    }

    function initCentipede() {
        centipede = [];
        // Começa no topo, no canto esquerdo
        const startX = 20;
        const startY = 20;
        const segments = 12 + level * 2;
        let dir = 1; // 1=dir, -1=esq
        let curX = startX, curY = startY;
        for (let i = 0; i < segments; i++) {
            centipede.push({
                x: curX,
                y: curY,
                radius: 6,
                dir: dir,
                alive: true
            });
            // Move para a direita (zigue-zague)
            if (i % 2 === 0) {
                curX += 14 * dir;
            } else {
                curY += 10;
                dir *= -1;
                curX += 14 * dir;
            }
            // Mantém dentro da tela
            if (curX < 10) curX = 10;
            if (curX > W - 10) curX = W - 10;
        }
    }

    function spawnSpider() {
        // Aranha aparece de um lado e se move erraticamente
        const side = Math.random() < 0.5 ? 0 : W;
        const y = 60 + Math.random() * (H - 120);
        spiders.push({
            x: side,
            y: y,
            vx: (side === 0 ? 1 : -1) * (1 + Math.random() * 1.5),
            vy: (Math.random() - 0.5) * 1.5,
            radius: 10,
            alive: true,
            wobble: 0
        });
    }

    function spawnFlea() {
        // Pulga cai verticalmente em uma coluna aleatória
        const x = 30 + Math.random() * (W - 60);
        fleas.push({
            x: x,
            y: 10,
            vy: 1.5 + level * 0.2,
            radius: 6,
            alive: true
        });
    }

    function spawnScorpion() {
        // Escorpião se move horizontalmente e envenena cogumelos
        const y = 60 + Math.random() * (H - 120);
        const dir = Math.random() < 0.5 ? 1 : -1;
        const x = dir === 1 ? -20 : W + 20;
        scorpions.push({
            x: x,
            y: y,
            vx: dir * (2 + level * 0.3),
            radius: 10,
            alive: true,
            dir: dir
        });
    }

    function resetPlayer() {
        player.x = W/2 - PLAYER_W/2;
        targetX = player.x;
    }

    function loseLife() {
        lives--;
        updateUI();
        if (lives <= 0) {
            gameOver = true;
            return;
        }
        resetPlayer();
        // Limpa tiros
        bullets = [];
        // Remove alguns inimigos para dar respiro
        spiders = spiders.filter(s => s.y < 100 || s.y > H - 100);
        fleas = fleas.filter(f => f.y < 50);
        scorpions = [];
    }

    function updateUI() {
        scoreSpan.textContent = score;
        levelSpan.textContent = level;
        livesSpan.textContent = lives;
    }

    function spawnParticles(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * 2 * Math.PI;
            const speed = 1 + Math.random() * 3;
            particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - 0.5,
                life: 1,
                decay: 0.02 + Math.random() * 0.03,
                size: 2 + Math.random() * 4,
                color
            });
        }
    }

    // ================================================================
    //  4.  LÓGICA DE TIROS
    // ================================================================

    function shoot() {
        if (gameOver || paused) return;
        if (shootCooldown > 0) return;
        bullets.push({
            x: player.x + PLAYER_W/2 - BULLET_W/2,
            y: player.y - BULLET_H,
            w: BULLET_W,
            h: BULLET_H,
            speed: BULLET_SPEED
        });
        shootCooldown = SHOOT_DELAY;
    }

    // ================================================================
    //  5.  ATUALIZAÇÃO
    // ================================================================

    function update() {
        if (paused || gameOver) return;

        // --- Cooldown do tiro ---
        if (shootCooldown > 0) shootCooldown--;

        // --- Movimento do jogador ---
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetX = player.x - 5;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) targetX = player.x + 5;
        player.x += (targetX - player.x) * 0.15;
        player.x = Math.max(0, Math.min(W - PLAYER_W, player.x));

        // --- Atualiza tiros ---
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.y -= b.speed;
            if (b.y + b.h < 0) { bullets.splice(i, 1); continue; }

            // Colisão com cogumelos
            let hit = false;
            for (const m of mushrooms) {
                if (!m.alive) continue;
                if (b.x < m.x + m.radius && b.x + b.w > m.x - m.radius &&
                    b.y < m.y + m.radius && b.y + b.h > m.y - m.radius) {
                    m.alive = false;
                    hit = true;
                    spawnParticles(m.x, m.y, '#8B6B4D', 10);
                    score += 5;
                    updateUI();
                    break;
                }
            }
            if (hit) { bullets.splice(i, 1); continue; }

            // Colisão com a centopeia
            for (const seg of centipede) {
                if (!seg.alive) continue;
                if (b.x < seg.x + seg.radius && b.x + b.w > seg.x - seg.radius &&
                    b.y < seg.y + seg.radius && b.y + b.h > seg.y - seg.radius) {
                    seg.alive = false;
                    hit = true;
                    score += 10;
                    updateUI();
                    spawnParticles(seg.x, seg.y, '#4d96ff', 12);
                    // Divide a centopeia? (simplificado: apenas remove o segmento)
                    break;
                }
            }
            if (hit) { bullets.splice(i, 1); continue; }

            // Colisão com aranhas
            for (const s of spiders) {
                if (!s.alive) continue;
                if (b.x < s.x + s.radius && b.x + b.w > s.x - s.radius &&
                    b.y < s.y + s.radius && b.y + b.h > s.y - s.radius) {
                    s.alive = false;
                    hit = true;
                    score += 20;
                    updateUI();
                    spawnParticles(s.x, s.y, '#ff6b6b', 15);
                    break;
                }
            }
            if (hit) { bullets.splice(i, 1); continue; }

            // Colisão com pulgas
            for (const f of fleas) {
                if (!f.alive) continue;
                if (b.x < f.x + f.radius && b.x + b.w > f.x - f.radius &&
                    b.y < f.y + f.radius && b.y + b.h > f.y - f.radius) {
                    f.alive = false;
                    hit = true;
                    score += 15;
                    updateUI();
                    spawnParticles(f.x, f.y, '#ffa94d', 12);
                    break;
                }
            }
            if (hit) { bullets.splice(i, 1); continue; }

            // Colisão com escorpiões
            for (const s of scorpions) {
                if (!s.alive) continue;
                if (b.x < s.x + s.radius && b.x + b.w > s.x - s.radius &&
                    b.y < s.y + s.radius && b.y + b.h > s.y - s.radius) {
                    s.alive = false;
                    hit = true;
                    score += 25;
                    updateUI();
                    spawnParticles(s.x, s.y, '#9b59b6', 15);
                    break;
                }
            }
            if (hit) { bullets.splice(i, 1); continue; }
        }

        // --- Movimento da centopeia ---
        // Remove segmentos mortos
        centipede = centipede.filter(s => s.alive);

        if (centipede.length > 0) {
            // A cabeça (primeiro segmento) se move, os outros seguem
            const head = centipede[0];
            // Movimento em zigue-zague: desce e muda de direção
            const speed = 1.2 + level * 0.15;
            // Checa colisão com cogumelos para desviar
            let blocked = false;
            let newX = head.x + head.dir * speed;
            let newY = head.y;
            // Verifica colisão com cogumelos
            for (const m of mushrooms) {
                if (!m.alive) continue;
                const dx = newX - m.x;
                const dy = newY - m.y;
                if (Math.sqrt(dx*dx + dy*dy) < head.radius + m.radius) {
                    blocked = true;
                    break;
                }
            }
            if (blocked || newX < 10 || newX > W - 10) {
                // Muda de direção e desce
                head.dir *= -1;
                newX = head.x + head.dir * speed;
                newY = head.y + 8;
                // Verifica novamente colisão
                let blocked2 = false;
                for (const m of mushrooms) {
                    if (!m.alive) continue;
                    const dx = newX - m.x;
                    const dy = newY - m.y;
                    if (Math.sqrt(dx*dx + dy*dy) < head.radius + m.radius) {
                        blocked2 = true;
                        break;
                    }
                }
                if (blocked2) {
                    // Se ainda bloqueado, tenta descer mais
                    newY += 6;
                }
            }
            // Limita à tela
            newX = Math.max(10, Math.min(W - 10, newX));
            // Atualiza a cabeça
            head.x = newX;
            head.y = newY;

            // Os segmentos seguem o anterior
            for (let i = 1; i < centipede.length; i++) {
                const prev = centipede[i-1];
                const seg = centipede[i];
                const dx = prev.x - seg.x;
                const dy = prev.y - seg.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 14) {
                    seg.x += dx * 0.1;
                    seg.y += dy * 0.1;
                }
                // Mantém alinhamento
                seg.x = Math.max(10, Math.min(W - 10, seg.x));
                seg.y = Math.max(10, Math.min(H - 10, seg.y));
            }

            // Verifica se a centopeia chegou perto do jogador (game over)
            if (head.y > player.y - 20 && Math.abs(head.x - (player.x + PLAYER_W/2)) < 30) {
                loseLife();
                if (gameOver) return;
                // Reseta a centopeia
                initCentipede();
            }
        } else {
            // Se a centopeia foi toda destruída, spawna uma nova (próximo nível)
            level++;
            updateUI();
            initCentipede();
            // Adiciona mais insetos
            for (let i = 0; i < level; i++) {
                if (Math.random() < 0.3) spawnSpider();
                if (Math.random() < 0.2) spawnFlea();
                if (level > 2 && Math.random() < 0.2) spawnScorpion();
            }
            // Recupera uma vida (bônus)
            if (lives < 5) lives++;
            updateUI();
            spawnParticles(W/2, H/2, '#ffd700', 40);
        }

        // --- Insetos extras ---
        // Aranhas
        for (let i = spiders.length - 1; i >= 0; i--) {
            const s = spiders[i];
            if (!s.alive) { spiders.splice(i, 1); continue; }
            s.x += s.vx;
            s.y += s.vy + Math.sin(s.wobble) * 0.3;
            s.wobble += 0.05;
            // Rebate nas bordas
            if (s.x < 10 || s.x > W - 10) s.vx *= -1;
            if (s.y < 40 || s.y > H - 40) s.vy *= -1;
            // Colisão com o jogador
            if (s.y > player.y - 20 && Math.abs(s.x - (player.x + PLAYER_W/2)) < 30) {
                loseLife();
                if (gameOver) return;
                spiders.splice(i, 1);
            }
        }

        // Pulgas
        for (let i = fleas.length - 1; i >= 0; i--) {
            const f = fleas[i];
            if (!f.alive) { fleas.splice(i, 1); continue; }
            f.y += f.vy;
            if (f.y > H - 20) { fleas.splice(i, 1); continue; }
            // Colisão com jogador
            if (f.y > player.y - 20 && Math.abs(f.x - (player.x + PLAYER_W/2)) < 20) {
                loseLife();
                if (gameOver) return;
                fleas.splice(i, 1);
            }
        }

        // Escorpiões
        for (let i = scorpions.length - 1; i >= 0; i--) {
            const s = scorpions[i];
            if (!s.alive) { scorpions.splice(i, 1); continue; }
            s.x += s.vx;
            if (s.x < -20 || s.x > W + 20) { scorpions.splice(i, 1); continue; }
            // Envenena cogumelos
            for (const m of mushrooms) {
                if (!m.alive || m.poisoned) continue;
                if (Math.abs(s.x - m.x) < 20 && Math.abs(s.y - m.y) < 20) {
                    m.poisoned = true;
                    spawnParticles(m.x, m.y, '#9b59b6', 8);
                }
            }
            // Colisão com jogador
            if (s.y > player.y - 20 && Math.abs(s.x - (player.x + PLAYER_W/2)) < 25) {
                loseLife();
                if (gameOver) return;
                scorpions.splice(i, 1);
            }
        }

        // --- Spawn aleatório de insetos (nível) ---
        if (Math.random() < 0.005 + level * 0.002) spawnSpider();
        if (Math.random() < 0.003 + level * 0.001) spawnFlea();
        if (level > 2 && Math.random() < 0.002 + level * 0.001) spawnScorpion();

        // --- Atualiza partículas ---
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // --- Verifica game over por falta de vidas ---
        if (lives <= 0) gameOver = true;
    }

    // ================================================================
    //  6.  RENDERIZAÇÃO
    // ================================================================

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // --- Fundo escuro com grid sutil ---
        ctx.fillStyle = '#0b0b16';
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for (let i = 0; i < W; i += 20) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, H);
            ctx.stroke();
        }
        for (let i = 0; i < H; i += 20) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(W, i);
            ctx.stroke();
        }

        // --- Cogumelos ---
        for (const m of mushrooms) {
            if (!m.alive) continue;
            const x = m.x, y = m.y, r = m.radius;
            // Tronco
            ctx.fillStyle = '#8B6B4D';
            ctx.fillRect(x - 2, y + 2, 4, 6);
            // Chapéu (círculo)
            ctx.shadowColor = m.poisoned ? '#9b59b6' : '#d4a373';
            ctx.shadowBlur = m.poisoned ? 15 : 8;
            ctx.fillStyle = m.poisoned ? '#9b59b6' : '#d4a373';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            // Pontos
            ctx.shadowBlur = 0;
            ctx.fillStyle = m.poisoned ? '#6a2a7a' : '#b88a6a';
            for (let i = 0; i < 4; i++) {
                const angle = i * Math.PI/2 + 0.3;
                ctx.beginPath();
                ctx.arc(x + Math.cos(angle) * r * 0.5, y + Math.sin(angle) * r * 0.4, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.shadowBlur = 0;

        // --- Centopeia ---
        for (let i = 0; i < centipede.length; i++) {
            const seg = centipede[i];
            if (!seg.alive) continue;
            const x = seg.x, y = seg.y, r = seg.radius;
            // Cor do segmento (cabeça mais clara)
            const isHead = i === 0;
            ctx.shadowColor = isHead ? '#4d96ff' : '#2a7a3a';
            ctx.shadowBlur = isHead ? 20 : 10;
            ctx.fillStyle = isHead ? '#4d96ff' : '#3a9a4a';
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            // Olhos na cabeça
            if (isHead) {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x - 4, y - 3, 2, 0, Math.PI * 2);
                ctx.arc(x + 4, y - 3, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#0b0b16';
                ctx.beginPath();
                ctx.arc(x - 5, y - 3, 1, 0, Math.PI * 2);
                ctx.arc(x + 3, y - 3, 1, 0, Math.PI * 2);
                ctx.fill();
            }
            // Antenas na cabeça
            if (isHead) {
                ctx.strokeStyle = '#4d96ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x - 4, y - 6);
                ctx.lineTo(x - 10, y - 12);
                ctx.moveTo(x + 4, y - 6);
                ctx.lineTo(x + 10, y - 12);
                ctx.stroke();
            }
        }
        ctx.shadowBlur = 0;

        // --- Aranhas ---
        for (const s of spiders) {
            if (!s.alive) continue;
            const x = s.x, y = s.y;
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(x, y, s.radius, 0, Math.PI * 2);
            ctx.fill();
            // Pernas
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#cc4444';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = i * Math.PI/4 + 0.2;
                ctx.beginPath();
                ctx.moveTo(x + Math.cos(angle) * 6, y + Math.sin(angle) * 6);
                ctx.lineTo(x + Math.cos(angle) * 16, y + Math.sin(angle) * 16);
                ctx.stroke();
            }
            // Olhos
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x - 3, y - 2, 2, 0, Math.PI * 2);
            ctx.arc(x + 3, y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0b0b16';
            ctx.beginPath();
            ctx.arc(x - 4, y - 2, 1, 0, Math.PI * 2);
            ctx.arc(x + 2, y - 2, 1, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Pulgas ---
        for (const f of fleas) {
            if (!f.alive) continue;
            const x = f.x, y = f.y;
            ctx.shadowColor = '#ffa94d';
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ffa94d';
            ctx.beginPath();
            ctx.ellipse(x, y, 8, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            // Asas
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.ellipse(x - 6, y - 2, 6, 4, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 6, y - 2, 6, 4, 0.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Escorpiões ---
        for (const s of scorpions) {
            if (!s.alive) continue;
            const x = s.x, y = s.y;
            ctx.shadowColor = '#9b59b6';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#9b59b6';
            ctx.beginPath();
            ctx.ellipse(x, y, 14, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            // Rabo
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#7a3a8a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x + (s.dir > 0 ? 10 : -10), y);
            ctx.lineTo(x + (s.dir > 0 ? 20 : -20), y - 10);
            ctx.stroke();
            // Ferrão
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(x + (s.dir > 0 ? 20 : -20), y - 10, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Tiros ---
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ffd700';
        for (const b of bullets) {
            ctx.fillRect(b.x, b.y, b.w, b.h);
            // Rastro
            ctx.fillStyle = 'rgba(255,215,0,0.2)';
            ctx.fillRect(b.x - 1, b.y + b.h, b.w + 2, 6);
            ctx.fillStyle = '#ffd700';
        }
        ctx.shadowBlur = 0;

        // --- Jogador (canhão) ---
        const px = player.x, py = player.y;
        // Base
        ctx.shadowColor = '#6c6cff';
        ctx.shadowBlur = 20;
        ctx.fillStyle = '#6c6cff';
        ctx.fillRect(px + 4, py + 8, 22, 8);
        // Cano
        ctx.fillRect(px + 12, py - 4, 6, 14);
        // Cabine
        ctx.fillStyle = '#4a4a8a';
        ctx.fillRect(px + 8, py + 2, 14, 8);
        // Detalhe
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(px + 10, py + 4, 10, 4);
        ctx.shadowBlur = 0;

        // --- Partículas ---
        for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        // --- Game Over ---
        if (gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const msg = lives <= 0 ? '💀 GAME OVER' : '🏆 VOCÊ VENCEU!';
            ctx.fillText(msg, W/2, H/2 - 20);
            ctx.fillStyle = '#a0a0c0';
            ctx.font = '20px sans-serif';
            ctx.fillText('Clique em "Reiniciar"', W/2, H/2 + 50);
        }

        // --- Pausa ---
        if (paused && !gameOver) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 44px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⏸ PAUSADO', W/2, H/2);
        }
    }

    // ================================================================
    //  7.  LOOP PRINCIPAL
    // ================================================================

    function gameLoop() {
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    // ================================================================
    //  8.  EVENTOS
    // ================================================================

    // --- Teclado ---
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (['ArrowLeft', 'ArrowRight', ' ', 'Space', 'p', 'P', 'a', 'A', 'd', 'D'].includes(key)) {
            e.preventDefault();
        }
        keys[key] = true;
        if (key === ' ' || key === 'Space') shoot();
        if (key === 'p' || key === 'P') togglePause();
    });

    document.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    // --- Mouse ---
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const x = (e.clientX - rect.left) * scaleX;
        targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W/2));
    });

    canvas.addEventListener('click', () => {
        if (!gameOver && !paused) shoot();
    });

    // --- Toque ---
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * scaleX;
        targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W/2));
    }, { passive: false });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameOver && !paused) shoot();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * scaleX;
        targetX = Math.max(0, Math.min(W - PLAYER_W, x - PLAYER_W/2));
    }, { passive: false });

    // --- Botões mobile ---
    let moveLeftPressed = false, moveRightPressed = false;
    moveLeftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveLeftPressed = true; });
    moveLeftBtn.addEventListener('touchend', () => { moveLeftPressed = false; });
    moveLeftBtn.addEventListener('mousedown', () => { moveLeftPressed = true; });
    moveLeftBtn.addEventListener('mouseup', () => { moveLeftPressed = false; });

    moveRightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveRightPressed = true; });
    moveRightBtn.addEventListener('touchend', () => { moveRightPressed = false; });
    moveRightBtn.addEventListener('mousedown', () => { moveRightPressed = true; });
    moveRightBtn.addEventListener('mouseup', () => { moveRightPressed = false; });

    fireBtn.addEventListener('click', shoot);
    fireBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

    // Movimento contínuo dos botões (setInterval)
    setInterval(() => {
        if (moveLeftPressed) targetX = Math.max(0, player.x - 5);
        if (moveRightPressed) targetX = Math.min(W - PLAYER_W, player.x + 5);
    }, 16);

    // --- Botões principais ---
    function togglePause() {
        if (gameOver) return;
        paused = !paused;
        pauseBtn.textContent = paused ? '▶️ Retomar' : '⏸️ Pausar';
        draw();
    }

    function restartGame() {
        lives = 3;
        level = 1;
        score = 0;
        gameOver = false;
        paused = false;
        pauseBtn.textContent = '⏸️ Pausar';
        particles = [];
        bullets = [];
        spiders = [];
        fleas = [];
        scorpions = [];
        initMushrooms();
        initCentipede();
        resetPlayer();
        updateUI();
        draw();
    }

    restartBtn.addEventListener('click', restartGame);
    pauseBtn.addEventListener('click', togglePause);

    // ================================================================
    //  9.  INICIALIZAR
    // ================================================================

    initMushrooms();
    initCentipede();
    resetPlayer();
    updateUI();
    gameLoop();
</script>
</body>
